# Single-host docker-compose deployment of the freshet stack.
# All services run on a shared user-defined network ("freshet"), with the
# dashboard exposed on host port 8080 by default.
#
# Override defaults via .env (see .env.example).
#
# After `docker compose up -d`, the schema is bootstrapped on first start of
# timescaledb. The `cron-river` and `cron-reservoir` services are simple
# loops that run the ingester scripts on a wall-clock cadence — for a more
# robust setup, swap them for systemd timers, host cron, or a real scheduler.

x-cron-base: &cron-base
  image: python:3.12-alpine
  restart: unless-stopped
  depends_on:
    postgrest:
      condition: service_started
  environment:
    POSTGREST_URL: http://postgrest:3000

services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-freshet}
      POSTGRES_USER: ${POSTGRES_USER:-freshet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set in .env}
    volumes:
      - tsdb-data:/var/lib/postgresql/data
      - ../../ingesters/river-history/bootstrap.sql:/docker-entrypoint-initdb.d/01-bootstrap.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER:-freshet}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB:-freshet}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-freshet}
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000

  dashboard:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    volumes:
      - ../../dashboard:/usr/share/nginx/html:ro
      - ../../dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ------------------------------------------------------------------------
  # Cron-style sidecars. Each runs its script in a sleep-loop. For production
  # use systemd timers or a host cron instead of these container loops.
  # ------------------------------------------------------------------------

  cron-river:
    <<: *cron-base
    command:
      - sh
      - -c
      - |
        set -e
        echo "river-history ingester starting; will run every hour"
        while true; do
          python /app/ingest.py || echo "river-history failed: $$?"
          sleep 3600
        done
    environment:
      POSTGREST_URL: http://postgrest:3000
      STATION_IDS: ${STATION_IDS:-1195,1004,951,545,1279,984,548,550,981,1264,442,994,982,983,522,196,211,300}
      MVCA_STATIONS: ${MVCA_STATIONS:-}
      MVCA_LOOKBACK_HOURS: ${MVCA_LOOKBACK_HOURS:-24}
    volumes:
      - ../../ingesters/river-history:/app:ro

  cron-reservoir:
    <<: *cron-base
    command:
      - sh
      - -c
      - |
        set -e
        echo "reservoir scraper starting; will run every 24h"
        while true; do
          python /app/scrape.py || echo "reservoir scrape failed: $$?"
          sleep 86400
        done
    volumes:
      - ../../ingesters/reservoir-ingest:/app:ro

  cron-hq:
    <<: *cron-base
    command:
      - sh
      - -c
      - |
        set -e
        echo "Hydro-Québec open-data ingester starting; will run every hour"
        while true; do
          python /app/ingest.py || echo "hq-ingest failed: $$?"
          sleep 3600
        done
    environment:
      POSTGREST_URL: http://postgrest:3000
      HQ_LAT_MIN: ${HQ_LAT_MIN:-45.0}
      HQ_LAT_MAX: ${HQ_LAT_MAX:-48.0}
      HQ_LON_MIN: ${HQ_LON_MIN:--80.0}
      HQ_LON_MAX: ${HQ_LON_MAX:--74.0}
    volumes:
      - ../../ingesters/hq-ingest:/app:ro

  cron-wsc:
    <<: *cron-base
    command:
      - sh
      - -c
      - |
        set -e
        echo "WSC realtime ingester starting; will run every hour"
        while true; do
          python /app/ingest.py || echo "wsc-ingest failed: $$?"
          sleep 3600
        done
    environment:
      POSTGREST_URL: http://postgrest:3000
      WSC_STATIONS: ${WSC_STATIONS:-}
      WSC_LOOKBACK_HOURS: ${WSC_LOOKBACK_HOURS:-24}
    volumes:
      - ../../ingesters/wsc-ingest:/app:ro

  cron-eccc:
    <<: *cron-base
    command:
      - sh
      - -c
      - |
        set -e
        echo "ECCC daily-climate ingester starting; will run every 6h"
        while true; do
          python /app/ingest.py || echo "eccc-ingest failed: $$?"
          sleep 21600
        done
    environment:
      POSTGREST_URL: http://postgrest:3000
      ECCC_YEARS_BACK: ${ECCC_YEARS_BACK:-1}
    volumes:
      - ../../ingesters/eccc-ingest:/app:ro

  cron-alerter:
    image: python:3.12-alpine
    restart: unless-stopped
    depends_on:
      - postgrest
    environment:
      NTFY_URL: ${NTFY_URL:-https://ntfy.sh}
      NTFY_TOPIC: ${NTFY_TOPIC:?set NTFY_TOPIC in .env}
      STATION_ID: ${ALERTER_STATION_ID:-1195}
    volumes:
      - ../../alerter:/app:ro
    command:
      - sh
      - -c
      - |
        set -e
        echo "alerter starting; will run every hour"
        while true; do
          python /app/alerter.py || echo "alerter failed: $$?"
          sleep 3600
        done

volumes:
  tsdb-data:
