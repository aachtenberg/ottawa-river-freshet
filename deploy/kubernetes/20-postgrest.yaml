---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgrest
  namespace: freshet
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgrest }
  template:
    metadata:
      labels: { app: postgrest }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: postgrest
          image: postgrest/postgrest:v12.2.0
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 3001
              name: admin
          env:
            - name: PGRST_DB_URI
              valueFrom:
                secretKeyRef:
                  name: timescaledb-credentials
                  key: POSTGRES_PASSWORD
                  # Build URI inline below — see also the workaround:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: timescaledb-credentials, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: timescaledb-credentials, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              valueFrom: { secretKeyRef: { name: timescaledb-credentials, key: POSTGRES_DB } }
            - name: PGRST_DB_SCHEMA
              value: public
            - name: PGRST_DB_ANON_ROLE
              valueFrom: { secretKeyRef: { name: timescaledb-credentials, key: POSTGRES_USER } }
            # Admin server: exposes /metrics (Prometheus), /live, /ready on :3001.
            - name: PGRST_ADMIN_SERVER_PORT
              value: "3001"
          # Build PGRST_DB_URI from the broken-out parts using a sh wrapper:
          command:
            - sh
            - -c
            - |
              export PGRST_DB_URI="postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb.freshet.svc.cluster.local:5432/${POSTGRES_DB}"
              exec postgrest
          livenessProbe:
            httpGet: { path: /live, port: admin }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: admin }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }

---
apiVersion: v1
kind: Service
metadata:
  name: postgrest
  namespace: freshet
spec:
  selector: { app: postgrest }
  ports:
    - port: 3000
      targetPort: 3000
      name: http
