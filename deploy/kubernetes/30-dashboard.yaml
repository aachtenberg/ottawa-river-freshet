    <div class="tab-panel" data-tab="reservoirs">
      <div class="section-title" style="margin-top: 4px;">Reservoir storage — basin-wide</div>
      <div class="section-subtitle">
        Percent-full of the major Ottawa River basin reservoirs. When upper-basin reservoirs approach 90%, operators lose discretion to absorb new inflow — that's the signal a freshet pulse will pass through to Lac Coulonge instead of being held back.
        Source: <a href="https://www.ottawariver.ca/conditions/?display=reservoir" target="_blank">ORRPB conditions page</a>, scraped daily.
        <button id="reservoir-methodology-btn" onclick="document.getElementById('reservoir-methodology').style.display = document.getElementById('reservoir-methodology').style.display === 'block' ? 'none' : 'block'" style="background:transparent;border:none;color:var(--blue);font-size:11px;cursor:pointer;padding:0;margin-left:6px;text-decoration:underline">How is percent-full calculated?</button>
        <div id="reservoir-methodology" style="display:none;margin-top:8px;padding:10px 12px;background:var(--surface-2);border-radius:6px;font-size:11px;line-height:1.55;color:var(--text-muted);">
          <p style="margin-bottom:6px;"><strong>Percent full</strong> is estimated using the difference between the published high and low operating limits for each reservoir. The low operating limit represents the minimum level at which a generating station or dam can maintain outflow under normal operating conditions.</p>
          <p style="margin-bottom:6px;">A simple linear approximation is applied across this operating range to estimate how full a reservoir is at a given level. This provides a reasonable point-in-time estimate of percent full based solely on water level relative to the operating limits.</p>
          <p style="margin-bottom:6px;">Reservoir level data is captured as a point-in-time measurement, while official daily values are typically finalized using 24-hour averaged data. As a result, the percent full displayed on cards reflects current conditions, but the reported daily percent-full value may lag slightly.</p>
          <p style="margin:0;">Official calculation methods used by reservoir operators may differ and may incorporate additional operational or hydrological factors. For authoritative information, consult the respective reservoir operators. Methodology adapted from Dan Poole's community-published reservoir gauge.</p>
        </div>
        <span id="reservoir-status-line" style="display:block; margin-top:6px; font-size:11px; color:var(--text-faint);"></span>
        <span id="reservoir-calibration-warning" style="display:none; margin-top:4px; font-size:11px; color:var(--orange);">⚠ Operating limits are starting estimates from operator documentation — not yet calibrated. Percent-full numbers may drift ± a few points until limits are finalized.</span>
      </div>
      <div class="reservoirs-grid" id="reservoirs-grid">
        <div class="skeleton">Loading reservoir data…</div>
      </div>
