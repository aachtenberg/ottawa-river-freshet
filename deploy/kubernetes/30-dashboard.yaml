---
# Dashboard ConfigMap. Build/refresh from the source tree with:
#   kubectl create configmap freshet-dashboard \
#     --from-file=index.html=../../dashboard/index.html \
#     --from-file=nginx.conf=../../dashboard/nginx.conf \
#     --from-file=favicon.svg=../../dashboard/favicon.svg \
#     --from-file=orw-dams.json=../../dashboard/orw-dams.json \
#     --from-file=reservoir-limits.json=../../dashboard/reservoir-limits.json \
#     -n freshet --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: ConfigMap
metadata:
  name: freshet-dashboard
  namespace: freshet
data:
  index.html: |
    <!-- Replaced at deploy time — see the README for the kubectl command. -->
  nginx.conf: |
    # Replaced at deploy time
  favicon.svg: |
    <!-- Replaced at deploy time -->
  orw-dams.json: |
    {}
  reservoir-limits.json: |
    {}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: freshet
spec:
  replicas: 1
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: freshet-dashboard
        - name: conf
          configMap:
            name: freshet-dashboard
            items:
              - key: nginx.conf
                path: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: freshet
spec:
  selector: { app: dashboard }
  ports:
    - port: 80
      targetPort: 80

---
# Replace `freshet.example.com` with your hostname before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard
  namespace: freshet
spec:
  rules:
    - host: freshet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port: { number: 80 }
