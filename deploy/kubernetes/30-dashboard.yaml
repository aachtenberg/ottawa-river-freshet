apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: freshet
spec:
  replicas: 1
  selector:
    matchLabels: { app: dashboard }
  template:
    metadata:
      labels: { app: dashboard }
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          readinessProbe:
            httpGet: { path: /healthz, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: freshet-dashboard
        - name: conf
          configMap:
            name: freshet-dashboard
            items:
              - key: nginx.conf
                path: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: freshet
spec:
  selector: { app: dashboard }
  ports:
    - port: 80
      targetPort: 80

---
# Replace `freshet.example.com` with your hostname before applying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dashboard
  namespace: freshet
spec:
  rules:
    - host: freshet.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port: { number: 80 }
