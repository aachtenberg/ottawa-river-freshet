    <div class="footer">
      <strong>Live data</strong> from Quebec MSP Vigilance API (Stations <a href="https://vigilance.geo.msp.gouv.qc.ca/stations/1195" target="_blank">1195 Lac Coulonge</a> and <a href="https://vigilance.geo.msp.gouv.qc.ca/stations/1004" target="_blank">1004 Coulonge River</a>).
      Auto-refreshes every 10 minutes. Operated by Hydro-Québec and Hydro Météo respectively.
      Property thresholds from personal 2019 flood observations.
      All timestamps shown in Eastern (America/Toronto).
      <br><strong>Unofficial dashboard</strong> — for official guidance consult <a href="https://www.ottawariver.ca/forecasts" target="_blank">ORRPB</a> and local authorities.
    </div>

    <script>
    const API_BASE = 'https://inedit-ro.geo.msp.gouv.qc.ca';
    const STATIONS = {
      1279: { chartId: 'waChart', infoId: 'wa-info', legendId: 'wa-legend', color: '#7A5ED8' },
      1195: { chartId: 'lcChart', infoId: 'lc-info', legendId: 'lc-legend', color: '#378ADD' },
      1004: { chartId: 'crChart', infoId: 'cr-info', legendId: 'cr-legend', color: '#D85A30' }
    };

    // Property thresholds. `histCount` = number of years out of HISTORICAL_RECORD_YEARS
    // where the annual daily max equalled or exceeded `level`. Sourced from
    // data/lac-coulonge-monthly-1972-2026.csv.
    const PROPERTY_THRESHOLDS = [
      { level: 108.30, desc: 'Water approaching property (2019: Apr 25)',     histCount: 6 },
      { level: 108.48, desc: 'Water in backyard, driveway, big tree (2019: Apr 26)', histCount: 4 },
      { level: 108.52, desc: 'Crawl space to floor joists (2017 peak)',       histCount: 4 },
      { level: 108.75, desc: 'Water at end of bricks on cottage (2019: Apr 27)', histCount: 3 },
      { level: 109.01, desc: 'WATER INSIDE cottage, garage, RV (2019: Apr 28)', histCount: 1 },
      { level: 109.17, desc: '2019 record — all-time high',                   histCount: 1 }
    ];
    const HISTORICAL_RECORD_YEARS = 55; // 1972-2026

    // All 54 annual daily-maximum levels, sorted descending. Used to rank the
    // current season's peak against history.
    const HISTORICAL_ANNUAL_MAX_DESC = [
      109.17, 108.85, 108.77, 108.52, 108.40, 108.32, 108.27, 108.16, 108.15, 108.01,
      107.96, 107.88, 107.87, 107.85, 107.84, 107.79, 107.78, 107.72, 107.72, 107.64,
      107.63, 107.61, 107.60, 107.58, 107.55, 107.52, 107.50, 107.49, 107.49, 107.46,
      107.46, 107.44, 107.44, 107.38, 107.36, 107.27, 107.23, 107.21, 107.20, 107.15,
      107.05, 107.02, 107.01, 107.00, 106.94, 106.78, 106.77, 106.74, 106.67, 106.66,
      106.65, 106.64, 106.61, 106.60
    ];

    function rankPeak(level) {
      // 1-indexed rank: number of historical years with peak > level, plus 1.
      let above = 0;
      for (const p of HISTORICAL_ANNUAL_MAX_DESC) {
        if (p > level) above++;
        else break;
      }
      return above + 1;
    }
    function ordinal(n) {
      const s = ['th', 'st', 'nd', 'rd'];
      const v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    const THRESHOLD_COLORS = {
      'simaj-niv': { label: 'Major flood', color: '#E24B4A' },
      'simoy-niv': { label: 'Moderate flood', color: '#EF9F27' },
      'sim-niv': { label: 'Minor flood', color: '#F0A030' },
      'spa-niv': { label: 'Pre-alert', color: '#888' }
    };

    // Historical Lac Coulonge peaks (1195) for chart overlay
    const HISTORICAL_PEAKS = [
      { year: 2019, level: 109.17 },
      { year: 2023, level: 108.77 },
      { year: 2017, level: 108.52 },
      { year: 2025, level: 108.15 }
    ];

    // Weather stations for the basin panel (open-meteo forecasts). Two groups:
    //   upstream  — drives the basin-wide freeze-night counter (snowmelt signal)
    //   downstream — context-only forecast for visitors watching the lower corridor
    const FREEZE_STATIONS = [
      // Upstream — used in the freeze-night basin summary
      { name: "Val-d'Or, QC",           role: 'Far-north headwaters',           group: 'upstream',   lat: 48.77, lon: -77.79 },
      { name: 'Rouyn-Noranda, QC',      role: 'North basin',                    group: 'upstream',   lat: 48.10, lon: -79.02 },
      { name: 'Temiskaming Shores, ON', role: 'Lake Timiskaming · north shore', group: 'upstream',   lat: 47.49, lon: -79.72,
        note: 'North-shore microclimate — chosen for upper-basin snowmelt sensing. Témiscaming QC at the south end is lake-moderated and warmer.' },
      { name: 'Pembroke, ON',           role: 'Local · upstream of Mansfield',  group: 'upstream',   lat: 45.82, lon: -77.11 },
      // Downstream — forecast context only
      { name: 'Ottawa-Gatineau',        role: 'Britannia / Hull / Aylmer area', group: 'downstream', lat: 45.42, lon: -75.70 },
      { name: 'Hawkesbury, ON',         role: 'Thurso / Masson / Carillon area',group: 'downstream', lat: 45.61, lon: -74.61 }
    ];

    // Regional context — Vigilance stations up- and downstream of Lac Coulonge.
    // Ordered upstream → downstream along the Ottawa River's flow.
    const REGIONAL_STATIONS = [
      { id: 951,  name: 'Temiscaming', subtitle: 'Lake Timiskaming village gauge · headwaters' },
      { id: 545,  name: 'Mattawa',     subtitle: 'Otto Holden tailwater · earliest northern pulse' },
      { id: 1279, name: 'Waltham',     subtitle: 'Route 148 · immediate upstream' },
      // Buckhams Bay is the local gauge for Constance Bay residents (MVCA, 2022+).
      // It sits at the NW (upstream) end of Lac Deschênes, with Aylmer mid-lake
      // and Britannia at the downstream/SE end. Buckhams reads ~10–30 cm higher
      // than Britannia during freshet — the two are routinely confused in local
      // media despite being 15+ km apart on the same lake.
      { id: 99001, name: 'Buckhams Bay', subtitle: 'Constance Bay · MVCA (~15 km upstream of Britannia)',
        source: 'mvca', tsId: 48242042, label: 'MVCA' },
      { id: 984,  name: 'Aylmer',      subtitle: 'Marina · Lac Deschenes (just upstream of Britannia)' },
      { id: 548,  name: 'Britannia',   subtitle: 'Ottawa · Lake Deschenes' },
      { id: 550,  name: 'Hull',        subtitle: 'Gatineau marina' },
      { id: 981,  name: 'Masson',      subtitle: 'Thurso area · traversier' },
      { id: 1264, name: 'Rigaud',      subtitle: 'Baie de Rigaud · downstream tail' }
    ];

    const charts = {};
    let lastDataTimestamp = null;
    let lastData = null;
    let lastSeasonPeaks = {};

    // ---- Page-level i18n + theme (persisted) ---------------------------------
    let pageLang = (typeof localStorage !== 'undefined' && localStorage.getItem('pageLang')) || 'en';
    const PAGE_STRINGS = {
      refresh:        { en: 'Refresh',                          fr: 'Actualiser' },
      map:            { en: 'Map',                              fr: 'Carte' },
      window:         { en: 'Window',                           fr: 'Période' },
      loading:        { en: 'Loading live data…',               fr: 'Chargement des données en direct…' },
      watershed:      { en: 'Watershed snapshot — current levels', fr: 'Aperçu du bassin — niveaux actuels' },
      watershed_sub:  { en: 'Main-stem stations upstream → downstream. Bar height = level (MASL); colour = current flood state; arrow = daily change vs. ~24 h ago. Click a bar to see its 2017/2019/2023 references.',
                        fr: 'Stations principales d\'amont en aval. Hauteur de la barre = niveau (MASL); couleur = état de crue actuel; flèche = variation quotidienne sur ~24 h. Cliquez sur une barre pour voir les références 2017 / 2019 / 2023.' },
      regional:       { en: 'Regional context — Ottawa River corridor', fr: 'Contexte régional — corridor de la rivière des Outaouais' },
      regional_sub:   { en: 'Upstream-to-downstream gauges along the Ottawa River. Upstream stations lead Lac Coulonge by hours-to-days and flag incoming pulses. Buckhams Bay (MVCA) and Britannia are separate gauges 15 km apart on Lac Deschênes — Buckhams is upstream and routinely reads higher; the two are commonly confused in local reporting.',
                        fr: 'Stations d\'amont en aval le long de la rivière des Outaouais. Les stations amont précèdent Lac Coulonge de quelques heures à plusieurs jours et signalent les vagues entrantes. Baie Buckhams (MVCA) et Britannia sont deux jauges distinctes séparées de 15 km sur le lac Deschênes — Buckhams est en amont et lit habituellement plus haut; les deux sont souvent confondues dans les médias locaux.' },
      property_t:     { en: 'Property thresholds (from 2019 observations)', fr: 'Seuils de la propriété (selon observations 2019)' },
      freeze_h:       { en: 'Basin freeze & precipitation outlook', fr: 'Aperçu du gel et précipitations dans le bassin' },
      freeze_sub:     { en: 'Overnight lows + 48 h precipitation across the basin. The freeze-night counter uses upstream stations only (snowmelt signal); downstream rows are local forecast for visitors watching the lower-corridor gauges.',
                        fr: 'Minimums nocturnes + précipitations sur 48 h dans le bassin. Le compteur de nuits de gel n\'utilise que les stations en amont (signal de fonte); les stations en aval sont des prévisions locales pour les visiteurs surveillant les jauges du corridor inférieur.' }
    };
    function tPage(key) { return (PAGE_STRINGS[key] && PAGE_STRINGS[key][pageLang]) || (PAGE_STRINGS[key] && PAGE_STRINGS[key].en) || key; }

    function applyPageLang() {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const k = el.dataset.i18n;
        if (PAGE_STRINGS[k]) el.textContent = tPage(k);
      });
      document.querySelectorAll('#page-lang-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === pageLang);
      });
      document.documentElement.lang = pageLang;
      // Keep the map drawer in sync.
      if (mapLang !== pageLang) {
        mapLang = pageLang;
        if (typeof applyMapLang === 'function') applyMapLang();
        if (mapInstance) renderMapMarkers();
      }
    }
    document.addEventListener('click', e => {
      const btn = e.target.closest('#page-lang-toggle button');
      if (!btn || btn.dataset.lang === pageLang) return;
      pageLang = btn.dataset.lang;
      try { localStorage.setItem('pageLang', pageLang); } catch (_) {}
      applyPageLang();
    });

    // ---- Theme (light / dark / OS-default) -----------------------------------
    function isDarkMode() {
      const t = document.documentElement.dataset.theme;
      if (t === 'light') return false;
      if (t === 'dark')  return true;
      return matchMedia('(prefers-color-scheme: dark)').matches;
    }
    function applyThemeIcon() {
      const btn = document.getElementById('theme-toggle');
      if (btn) btn.textContent = isDarkMode() ? '☀' : '🌙';
    }
    function toggleTheme() {
      const next = isDarkMode() ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem('theme', next); } catch (_) {}
      applyThemeIcon();
      // Re-render anything that uses isDarkMode() at draw-time.
      if (lastData) {
        if (typeof renderCorridorBar === 'function') renderCorridorBar();
        if (typeof renderWindow === 'function') { renderWindow(1279); renderWindow(1195); renderWindow(1004); }
      }
    }
    // Apply persisted theme on load (must happen before paint to avoid flash).
    (function bootTheme() {
      try {
        const t = localStorage.getItem('theme');
        if (t === 'light' || t === 'dark') document.documentElement.dataset.theme = t;
      } catch (_) {}
    })();
    const historyCache = {}; // { "1195:168": [{valeur, date_prise_valeur}, ...] }
    let windowHours = 72;

    // Vigilance emits UTC in naked ISO form (e.g. "2026-04-21T17:00:00" = 17:00 UTC = 13:00 EDT).
    function parseVigilance(iso) {
      if (!iso) return null;
      const s = String(iso);
      const withZ = (s.endsWith('Z') || /[+\-]\d{2}:?\d{2}$/.test(s)) ? s : s + 'Z';
      const d = new Date(withZ);
      return isNaN(d) ? null : d;
    }

    // open-meteo, requested with timezone=America/Toronto, emits naked ISO as Eastern wall-clock.
    function parseEastern(iso) {
      if (!iso) return null;
      const clean = String(iso).replace(/[Zz]|[+\-]\d{2}:?\d{2}$/, '');
      const naive = new Date(clean + 'Z');
      if (isNaN(naive)) return null;
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Toronto', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
      });
      const parts = Object.fromEntries(fmt.formatToParts(naive).map(p => [p.type, p.value]));
      const easternAsUTC = Date.UTC(+parts.year, +parts.month - 1, +parts.day, +parts.hour % 24, +parts.minute, +parts.second);
      return new Date(naive.getTime() + (naive.getTime() - easternAsUTC));
    }

    function easternDateKey(d = new Date()) {
      const fmt = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Toronto', year: 'numeric', month: '2-digit', day: '2-digit' });
      const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
      return `${parts.year}-${parts.month}-${parts.day}`;
    }

    // timeLabel formats a Vigilance timestamp (UTC) as Eastern wall-clock.
    function timeLabel(iso) {
      const d = parseVigilance(iso);
      if (!d) return '';
      const fmt = new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Toronto',
        day: 'numeric', month: 'short', hour: '2-digit', hour12: false
      });
      const parts = Object.fromEntries(fmt.formatToParts(d).map(p => [p.type, p.value]));
      return `${parts.day} ${parts.month} ${String(parts.hour).padStart(2, '0')}h`;
    }
    function formatTrend(t) {
      if (t === null || t === undefined || Math.abs(t) < 0.001) return { text: '<span class="arrow">→</span>', cls: 'flat' };
      if (t < 0) return { text: `<span class="arrow">↓</span> ${Math.abs(t*100).toFixed(1)} cm/h`, cls: 'down' };
      return { text: `<span class="arrow">↑</span> ${(t*100).toFixed(1)} cm/h`, cls: 'up' };
    }

    // Render a "Q: 4,866 m³/s" secondary row, or empty string if flow data missing.
    // Vigilance only surfaces discharge on a subset of stations (notably Britannia).
    function flowRow(metadata) {
      const q = metadata?.dern_valeur_deb;
      if (q === null || q === undefined) return '';
      const formatted = Math.round(q).toLocaleString('en-CA');
      const td = metadata.trend_deb;
      let trendHtml = '';
      if (td !== null && td !== undefined && Math.abs(td) >= 0.5) {
        const arrow = td > 0 ? '↑' : '↓';
        const cls = td > 0 ? 'up' : 'down';
        trendHtml = ` <span class="trend ${cls}"><span class="arrow">${arrow}</span> ${Math.abs(td).toFixed(0)} m³/s/h</span>`;
      }
      return `<div class="value-secondary">Q: ${formatted}<span class="unit">m³/s</span>${trendHtml}</div>`;
    }
    function ago(iso) {
      const d = parseVigilance(iso);
      if (!d) return '';
      const m = Math.round((Date.now() - d.getTime()) / 60000);
      if (m < 1) return 'just now';
      if (m < 60) return `${m} min ago`;
      if (m < 1440) return `${Math.round(m/60)} h ago`;
      return `${Math.round(m/1440)} d ago`;
    }

    function etaToThreshold(current, target, ratePerHour) {
      if (current >= target) return null;
      if (!ratePerHour || ratePerHour <= 0.00005) return null;
      const hours = (target - current) / ratePerHour;
      if (hours > 72) return null;
      if (hours < 1) return `~${Math.max(5, Math.round(hours * 60 / 5) * 5)} min`;
      if (hours < 24) return `~${hours.toFixed(1)} h`;
      return `~${Math.floor(hours / 24)}d ${Math.round(hours % 24)}h`;
    }

    // Open-meteo accepts comma-separated lat/lon and returns an array, one entry
    // per location. One call covers all stations and avoids the per-IP rate limit
    // (HTTP 429) we were hitting with parallel single-location requests.
    async function fetchWeather() {
      const lats = FREEZE_STATIONS.map(s => s.lat).join(',');
      const lons = FREEZE_STATIONS.map(s => s.lon).join(',');
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&hourly=temperature_2m,precipitation&past_days=1&forecast_days=7&timezone=America%2FToronto`;
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`weather HTTP ${r.status}`);
      const j = await r.json();
      const items = Array.isArray(j) ? j : [j];
      return FREEZE_STATIONS.map((s, i) => ({ station: s, hourly: items[i]?.hourly }));
    }

    // Sum precipitation over the next N hours from now
    function next48hPrecip(hourly) {
      const now = Date.now();
      const horizon = now + 48 * 3600 * 1000;
      let total = 0;
      for (let i = 0; i < hourly.time.length; i++) {
        const t = parseEastern(hourly.time[i]);
        if (!t) continue;
        const ms = t.getTime();
        if (ms < now || ms > horizon) continue;
        const p = hourly.precipitation?.[i];
        if (p != null) total += p;
      }
      return total;
    }

    // Compute overnight lows keyed by the "morning" date (20:00 prev → 08:00 current)
    // open-meteo is requested with timezone=America/Toronto; parse string parts directly.
    function overnightLows(hourly) {
      const byMorning = {};
      for (let i = 0; i < hourly.time.length; i++) {
        const m = String(hourly.time[i]).match(/^(\d{4})-(\d{2})-(\d{2})T(\d{2})/);
        if (!m) continue;
        const hour = parseInt(m[4], 10);
        let morningKey;
        if (hour >= 20) {
          // roll to the next calendar day (Eastern)
          const d = new Date(Date.UTC(+m[1], +m[2] - 1, +m[3]));
          d.setUTCDate(d.getUTCDate() + 1);
          morningKey = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        } else if (hour < 8) {
          morningKey = `${m[1]}-${m[2]}-${m[3]}`;
        } else continue;
        const temp = hourly.temperature_2m[i];
        if (temp == null) continue;
        if (!byMorning[morningKey] || temp < byMorning[morningKey].temp) {
          byMorning[morningKey] = { temp, time: hourly.time[i] };
        }
      }
      return Object.keys(byMorning).sort().map(date => ({ date, temp: byMorning[date].temp }));
    }

    function renderFreezePanel(weather) {
      const todayKey = easternDateKey();
      const grid = document.getElementById('freeze-grid');
      grid.classList.remove('skeleton');

      let basinFreezeNights = 0;  // nights where every station goes sub-zero
      let trackedNights = 0;
      const perStation = weather.map(({ station, hourly }) => {
        const lows = overnightLows(hourly);
        const week = lows.filter(l => {
          const diff = (new Date(l.date) - new Date(todayKey)) / 86400000;
          return diff >= 0 && diff <= 6;
        });
        return { station, nights: week, precipMm: next48hPrecip(hourly) };
      });

      // Tally basin-wide freezes across the 7-day window (last night + 6 forward).
      // Only upstream stations count — downstream stations rarely freeze in late
      // freshet and would always read "0 freeze nights" otherwise.
      const upstream = perStation.filter(p => (p.station.group || 'upstream') === 'upstream');
      const dates = Array.from(new Set(upstream.flatMap(p => p.nights.map(n => n.date)))).sort();
      for (const d of dates) {
        const diff = (new Date(d) - new Date(todayKey)) / 86400000;
        if (diff < 0 || diff > 6) continue;
        trackedNights++;
        const allSubZero = upstream.every(p => {
          const n = p.nights.find(x => x.date === d);
          return n && n.temp < 0;
        });
        if (allSubZero) basinFreezeNights++;
      }

      const sumBox = document.getElementById('freeze-summary');
      sumBox.classList.remove('skeleton');
      if (basinFreezeNights >= 3) {
        sumBox.className = 'freeze-summary good';
        sumBox.innerHTML = `<strong>✓ ${basinFreezeNights}/${trackedNights} freeze nights basin-wide (7-day outlook).</strong> Snowmelt paused or expected to pause — conditions favour a capped freshet.`;
      } else if (basinFreezeNights >= 1) {
        sumBox.className = 'freeze-summary warn';
        sumBox.innerHTML = `<strong>${basinFreezeNights}/${trackedNights} freeze nights basin-wide (7-day outlook).</strong> Partial melt slowdown — watch forecast for additional freezes.`;
      } else {
        sumBox.className = 'freeze-summary bad';
        sumBox.innerHTML = `<strong>0/${trackedNights} freeze nights basin-wide (7-day outlook).</strong> Active snowmelt ongoing or expected — monitor river rise rate closely.`;
      }

      let lastGroup = null;
      grid.innerHTML = perStation.map(({ station, nights, precipMm }) => {
        const groupKey = station.group || 'upstream';
        const groupHeader = lastGroup !== groupKey
          ? `<div class="freeze-group-header">${groupKey === 'upstream' ? 'Upstream — drives freeze-night counter' : 'Downstream — local forecast'}</div>`
          : '';
        lastGroup = groupKey;
        const precipCls = precipMm >= 20 ? 'rain-heavy' : precipMm >= 5 ? 'rain-moderate' : 'rain-light';
        const precipLabel = `<span class="precip-chip ${precipCls}" title="Forecast precipitation next 48 hours">☔ ${precipMm.toFixed(1)} mm / 48h</span>`;
        const chips = nights.map(n => {
          const diff = (new Date(n.date) - new Date(todayKey)) / 86400000;
          const isForecast = diff > 0;
          const cls = n.temp < 0 ? 'freeze' : n.temp < 3 ? 'near' : 'warm';
          const d = new Date(n.date);
          const label = diff === 0 ? 'Last night' : diff === 1 ? 'Tonight' : diff === 2 ? 'Tomorrow' : `${d.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]}`;
          return `<div class="night-chip ${cls}${isForecast ? ' forecast' : ''}">
            <span class="n-date">${label}</span>
            <span class="n-temp">${n.temp > 0 ? '+' : ''}${n.temp.toFixed(0)}°</span>
          </div>`;
        }).join('');
        const roleHtml = station.note
          ? `<span class="station-role" title="${station.note}" style="cursor:help;border-bottom:1px dotted var(--text-faint)">${station.role}</span>`
          : `<span class="station-role">${station.role}</span>`;
        return `${groupHeader}<div class="freeze-row">
          <div><span class="station-name">${station.name}</span>${roleHtml}${precipLabel}</div>
          <div class="freeze-nights">${chips}</div>
        </div>`;
      }).join('');
    }

    async function fetchRegional() {
      const results = await Promise.allSettled(REGIONAL_STATIONS.map(s =>
        s.source === 'mvca' ? fetchKiwisStation(s) : fetchStation(s.id)
      ));
      return REGIONAL_STATIONS.map((s, i) => ({
        meta: s,
        ok: results[i].status === 'fulfilled',
        data: results[i].status === 'fulfilled' ? results[i].value : null,
        error: results[i].status === 'rejected' ? results[i].reason?.message : null
      }));
    }

    // MVCA's Buckhams Bay gauge is published via Kisters KiWIS (same backend the
    // MVCA water-levels site uses). The endpoint is open and CORS-permissive, so
    // we fetch it directly from the browser. We shape the response to match
    // Vigilance's {metadata, readings} so the existing card / bar-chart / map
    // renderers don't need an MVCA-specific branch.
    const KIWIS_BASE = 'https://waterdata.quinteconservation.ca/KiWIS/KiWIS';
    function latLonToWm(lat, lon) {
      const x = lon * Math.PI / 180 * 6378137;
      const y = Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) * 6378137;
      return [x, y];
    }
    async function fetchKiwisStation(spec) {
      const since = new Date(Date.now() - 72 * 3600 * 1000).toISOString();
      const url = `${KIWIS_BASE}?service=kisters&type=queryServices&request=getTimeseriesValues&datasource=0&format=json`
        + `&ts_id=${spec.tsId}&header=true&metadata=true`
        + '&md_returnfields=station_name,parametertype_name,station_latitude,station_longitude'
        + `&dateformat=UNIX&from=${encodeURIComponent(since)}`;
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`KiWIS HTTP ${r.status}`);
      const arr = await r.json();
      if (!Array.isArray(arr) || !arr[0] || !Array.isArray(arr[0].data)) throw new Error('KiWIS empty');
      const ts = arr[0];
      const readings = ts.data
        .filter(row => Array.isArray(row) && row[1] != null && Number.isFinite(row[1]))
        .map(([t, v]) => ({ valeur: v, date_prise_valeur: new Date(t).toISOString() }));
      if (!readings.length) throw new Error('KiWIS no values');
      const last = readings[readings.length - 1];

      // Trend in m/h, derived from the last ~3 hours of readings (Vigilance's
      // trend_niv unit). Falls back to null if we don't have enough samples.
      const lastMs = new Date(last.date_prise_valeur).getTime();
      const recent = readings.filter(r => lastMs - new Date(r.date_prise_valeur).getTime() <= 3 * 3600 * 1000);
      let trend_niv = null;
      if (recent.length >= 2) {
        const a = recent[0], b = recent[recent.length - 1];
        const hours = (new Date(b.date_prise_valeur) - new Date(a.date_prise_valeur)) / 3600000;
        if (hours > 0) trend_niv = (b.valeur - a.valeur) / hours;
      }

      const lat = parseFloat(ts.station_latitude);
      const lon = parseFloat(ts.station_longitude);
      const geom = (Number.isFinite(lat) && Number.isFinite(lon))
        ? { type: 'Point', coordinates: latLonToWm(lat, lon) } : null;

      return {
        metadata: {
          id: spec.id,
          label: spec.label || 'MVCA',
          description: ts.station_name,
          plan_deau: 'Ottawa River',
          fournisseur_nom: 'MVCA',
          dern_valeur_niv: last.valeur,
          dern_valeur_deb: null,
          etat_niv: null,           // MVCA doesn't publish flood-state buckets
          trend_niv,
          trend_deb: null,
          derniere_lecture: last.date_prise_valeur,
          geom_p: geom
        },
        readings
      };
    }

    // Distinguish a true post-peak decline from "still rising / at session high."
    // A reading is "peaked" only when the window max is at least PEAK_AGE_MIN_HOURS
    // old AND the latest is at least PEAK_DROP_MIN_M below it. Below that bar we
    // haven't actually turned — the value is just a session high.
    const PEAK_AGE_MIN_HOURS = 6;
    const PEAK_DROP_MIN_M = 0.02;
    function classifyPeak(readings, latest) {
      if (!readings || !readings.length || !latest) {
        return { peak: latest || null, isPeaked: false, dropCm: 0 };
      }
      const peak = readings.reduce((p, v) => v.valeur > p.valeur ? v : p, readings[0]);
      const ageH = (new Date(latest.date_prise_valeur) - new Date(peak.date_prise_valeur)) / 3600000;
      const drop = peak.valeur - latest.valeur;
      return {
        peak,
        isPeaked: ageH >= PEAK_AGE_MIN_HOURS && drop >= PEAK_DROP_MIN_M,
        dropCm: drop * 100,
      };
    }

    function renderRegional(rows) {
      const ETAT_BADGES = {
        6: { cls: 'major', label: 'Major flood' },
        5: { cls: 'near',  label: 'Near major' },
        4: { cls: 'near',  label: 'Moderate' },
        3: { cls: 'near',  label: 'Minor' },
        2: { cls: 'peaked',label: 'Pre-alert' },
        1: { cls: 'peaked',label: 'Normal' }
      };
      const container = document.getElementById('regional-cards');
      container.innerHTML = rows.map(({ meta, ok, data, error }) => {
        if (!ok) return `<div class="card" data-station-id="${meta.id}"><div class="label">${meta.name}</div><div class="sub">Unavailable: ${error || 'error'}</div></div>`;
        const latest = data.readings[data.readings.length - 1];
        const pk = classifyPeak(data.readings, latest);
        const t = formatTrend(data.metadata.trend_niv);
        const eff = getEffectiveEtat(data.metadata);
        const badgeInfo = ETAT_BADGES[eff];
        const synthetic = isEffectiveEtatSynthetic(data.metadata);
        const synth = synthetic ? ' <span style="font-weight:400;opacity:0.8" title="Estimated from ORRPB / ECCC historical record">(est.)</span>' : '';
        const badge = badgeInfo ? `<span class="badge ${badgeInfo.cls}">${badgeInfo.label}${synth}</span>` : '';
        const orrpb = getOrrpbContext(data.metadata);
        const orrpbLine = orrpb ? `<br><span style="font-size:10px;opacity:0.8;color:var(--text-muted)">ORRPB ref: ${orrpb.context}</span>` : '';
        const peakBadge = pk.isPeaked ? `<span class="badge peaked">↓ ${pk.dropCm.toFixed(1)} cm off peak</span>` : '';
        const peakLabel = pk.isPeaked ? 'Peak' : 'High so far';
        const publicLabel = data.metadata.label ? `<span class="station-id">${data.metadata.label}</span>` : '';
        const dispCurrent = displayLevel(data.metadata, latest.valeur);
        const dispPeak = displayLevel(data.metadata, pk.peak.valeur);
        return `
          <div class="card" data-station-id="${meta.id}">
            <div class="label">${meta.name}${publicLabel} — ${meta.subtitle}</div>
            <div class="value">
              <span>${dispCurrent.toFixed(3)}</span>
              <span class="unit">m</span>
              <span class="trend ${t.cls}">${t.text}</span>
            </div>
            ${flowRow(data.metadata)}
            <div class="sub">
              Reading ${ago(latest.date_prise_valeur)} · ${peakLabel}: <strong>${dispPeak.toFixed(3)} m</strong>
              <br>${badge}${peakBadge}${orrpbLine}
            </div>
          </div>
        `;
      }).join('');
    }

    // ---- ORRPB historical peaks (from "Know Your Levels" PDF, 2025-05-06) ---------
    // Source: ottawa-river-vigilance/data/orrpb-historic-peaks-1972-2025.csv
    // datumOffset = MASL_value - API_gauge_value. Quebec stations report MASL
    // natively (offset 0); Ontario stations via ECCC mirror use an "assumed datum"
    // 100 m below MASL. Stations not listed here aren't in the ORRPB PDF.
    const ORRPB_HISTORIC_PEAKS = {
      // Temiscaming village gauge — ECCC 02JE025 uses an assumed datum referenced
      // to lake-floor; offset to MASL ≈ 173.65 (calibrated against Dan Poole's
      // 2026-04-29 reading of 178.65 m vs. the gauge's 5.00 raw value). No ORRPB
      // peak data published for this gauge.
      951:  { datumOffset: 173.65, peaks: {} },
      545:  { datumOffset: 100, peaks: { 2017: 153.95, 2019: 155.55, 2023: 154.69 } }, // Mattawa
      548:  { datumOffset: 0,   peaks: { 2017: 60.44,  2019: 60.68,  2023: 60.35  } }, // Britannia
      // Buckhams Bay (MVCA, CGVD28) — datum matches MASL; only operational since
      // 2022 so no 2017/2019 peaks. 2023 freshet peak from MVCA KiWIS: 60.40 m
      // (vs. Britannia's 60.35 m the same year — the two stations are close but
      // not identical, hence the value of tracking both).
      99001:{ datumOffset: 0,   peaks: { 2023: 60.40 } }, // Buckhams Bay (MVCA)
      550:  { datumOffset: 0,   peaks: { 2017: 45.20,  2019: 45.17,  2023: 44.68  } }, // Hull
      981:  { datumOffset: 0,   peaks: { 2017: 43.69,  2019: 43.66,  2023: 43.19  } }, // Masson/Thurso
      1195: { datumOffset: 0,   peaks: { 2017: 108.52, 2019: 109.17, 2023: 108.77 } }, // Lac Coulonge
      1264: { datumOffset: 0,   peaks: { 2017: 25.11,  2019: 25.11,  2023: 24.71  } }  // Rigaud (below Carillon)
    };

    // Convert a raw API gauge reading to MASL using the per-station datum offset.
    // Stations whose Vigilance label reports MASL natively have offset 0.
    function displayLevel(meta, raw) {
      if (raw == null) return null;
      return raw + (ORRPB_HISTORIC_PEAKS[meta?.id]?.datumOffset || 0);
    }

    // Returns { etat, context } where etat is 4-6 if current ≥ at least one
    // reference year, null if below all three; context is a human-readable label
    // like "above 2023, 81 cm below 2019 record".
    function getOrrpbContext(meta) {
      const o = ORRPB_HISTORIC_PEAKS[meta?.id];
      if (!o || meta.dern_valeur_niv == null) return null;
      if (!o.peaks || Object.keys(o.peaks).length === 0) return null;
      const masl = meta.dern_valeur_niv + o.datumOffset;
      const refs = Object.entries(o.peaks)
        .map(([year, level]) => ({ year: Number(year), level }))
        .sort((a, b) => b.level - a.level); // descending
      const recordYear = refs[0];
      // refs may have <3 entries (e.g. MVCA-only stations with limited history),
      // so each rung is guarded.
      let etat = null;
      if      (refs[0] && masl >= refs[0].level) etat = 6;
      else if (refs[1] && masl >= refs[1].level) etat = 5;
      else if (refs[2] && masl >= refs[2].level) etat = 4;
      // Context label
      let context;
      if (etat === 6) {
        const dCm = Math.round((masl - refs[0].level) * 100);
        context = dCm < 5 ? `at ${recordYear.year} record` : `${dCm} cm above ${recordYear.year} record`;
      } else if (etat === 5 || etat === 4) {
        const lower = refs.filter(r => masl >= r.level).slice(-1)[0];
        const higher = refs.filter(r => r.level > masl).slice(-1)[0];
        const dHigher = Math.round((higher.level - masl) * 100);
        context = `above ${lower.year}, ${dHigher} cm below ${higher.year}`;
      } else {
        const lowest = refs[refs.length - 1];
        const dCm = Math.round((lowest.level - masl) * 100);
        context = `${dCm} cm below ${lowest.year} freshet peak`;
      }
      return { etat, context };
    }

    // ---- ECCC HYDAT fallback for Ontario stations without Vigilance thresholds ----
    // Vigilance returns etat_niv=0 for Ontario stations it mirrors but doesn't
    // classify (Mattawa is the obvious case). We fetch the station's historical
    // annual peaks from ECCC and bucket the current reading by percentile —
    // the same intuition as USGS's "much above normal" classification.
    const eccPeakCache = {};
    const WSC_ID_PATTERN = /^\d{2}[A-Z]{2}\d{3}$/;

    async function ensureEcccPeaks(wscId) {
      if (eccPeakCache[wscId] !== undefined) return eccPeakCache[wscId];
      try {
        const url = `https://api.weather.gc.ca/collections/hydrometric-annual-statistics/items?STATION_NUMBER=${wscId}&limit=200&f=json`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        const peaks = (data.features || [])
          .filter(f => f.properties?.DATA_TYPE_EN === 'Water Level')
          .map(f => f.properties.MAX_VALUE)
          .filter(Number.isFinite)
          .sort((a, b) => b - a);
        eccPeakCache[wscId] = peaks.length ? peaks : null;
      } catch (e) {
        console.warn(`ECCC peaks ${wscId}: ${e.message}`);
        eccPeakCache[wscId] = null;
      }
      return eccPeakCache[wscId];
    }

    function getEffectiveEtat(meta) {
      // Vigilance's official etat wins when it's defined (>0).
      if (meta?.etat_niv != null && meta.etat_niv > 0) return meta.etat_niv;
      // Then ORRPB-published reference years (PDF) — directly tied to memorable floods.
      const orrpb = getOrrpbContext(meta);
      if (orrpb && orrpb.etat) return orrpb.etat;
      // Finally, ECCC long-record percentile fallback.
      if (!meta?.label || !WSC_ID_PATTERN.test(meta.label)) return meta?.etat_niv;
      if (meta.dern_valeur_niv == null) return meta.etat_niv;
      const peaks = eccPeakCache[meta.label];
      if (!peaks) return meta.etat_niv;
      const above = peaks.filter(p => meta.dern_valeur_niv >= p).length;
      const pctl = (above / peaks.length) * 100;
      if (pctl >= 99) return 6;
      if (pctl >= 95) return 5;
      if (pctl >= 90) return 4;
      if (pctl >= 75) return 3;
      if (pctl >= 50) return 2;
      return 1;
    }

    function isEffectiveEtatSynthetic(meta) {
      if (meta?.etat_niv != null && meta.etat_niv > 0) return false;
      const orrpb = getOrrpbContext(meta);
      if (orrpb && orrpb.etat) return true;
      return !!meta?.label && WSC_ID_PATTERN.test(meta.label) && !!eccPeakCache[meta.label];
    }

    async function precomputeEcccPeaks(metas) {
      const ids = [...new Set(metas
        .filter(m => m && (m.etat_niv == null || m.etat_niv === 0) && m.label && WSC_ID_PATTERN.test(m.label))
        .map(m => m.label))];
      await Promise.all(ids.map(ensureEcccPeaks));
    }

    async function fetchStation(id) {
      const [mdR, rdR] = await Promise.all([
        fetch(`${API_BASE}/station_details_metadata_api?id=eq.${id}`, { cache: 'no-store' }),
        fetch(`${API_BASE}/station_details_readings_api?id=eq.${id}`, { cache: 'no-store' })
      ]);
      if (!mdR.ok || !rdR.ok) throw new Error(`HTTP ${mdR.status}/${rdR.status}`);
      const [md, rd] = await Promise.all([mdR.json(), rdR.json()]);
      return { metadata: md[0], readings: rd[0].valeurs_niv };
    }

    function renderStatus(type, message) {
      const el = document.getElementById('status');
      const cls = type === 'live' ? 'live' : type === 'stale' ? 'stale' : 'error';
      el.innerHTML = `<span class="dot ${cls}"></span>${message}`;
    }

    function renderBanner(type, html) {
      const b = document.getElementById('banner');
      if (!html) { b.classList.remove('show'); return; }
      b.className = `banner show ${type}`;
      b.innerHTML = html;
    }

    function renderCards(data, seasonPeaks = {}) {
      const container = document.getElementById('cards');
      const items = [
        // Featured — sits on top, full-width, large numbers. Property gauge.
        { id: 1195, name: 'Lac Coulonge',  subtitle: 'Ottawa River · Hydro-Québec · property gauge', cls: 'primary feature' },
        // Supporting context row below.
        { id: 545,  name: 'Mattawa',       subtitle: 'Otto Holden tailwater · earliest upstream pulse', cls: 'headwater' },
        { id: 1279, name: 'Waltham',       subtitle: 'Ottawa River · upstream (Route 148)',  cls: 'upstream' },
        { id: 1004, name: 'Coulonge River', subtitle: 'Route 148 bridge · unregulated',       cls: 'tributary' }
      ];
      container.innerHTML = items.filter(item => data[item.id]).map(item => {
        const d = data[item.id];
        const m = d.metadata;
        const latest = d.readings[d.readings.length - 1];
        const windowPk = classifyPeak(d.readings, latest);
        // Prefer the season-to-date peak from history if it's higher than the live
        // buffer's max. A higher season peak is by definition a true past peak
        // (older than the 72h live buffer), so it always counts as "peaked."
        const seasonPeak = seasonPeaks[item.id];
        const seasonWins = seasonPeak && seasonPeak.valeur > windowPk.peak.valeur;
        const peak = seasonWins ? seasonPeak : windowPk.peak;
        const isDeclining = seasonWins || windowPk.isPeaked;
        const peakSource = seasonWins ? 'Season peak' : (isDeclining ? 'Peak' : 'High so far');
        const peakDrop = ((peak.valeur - latest.valeur) * 100).toFixed(1);
        const t = formatTrend(m.trend_niv);
        const eff = getEffectiveEtat(m);
        const synthetic = isEffectiveEtatSynthetic(m);
        const synthSuffix = synthetic ? ' <span style="font-weight:400;opacity:0.85" title="Estimated from ECCC historical record (no Vigilance threshold)">(est.)</span>' : '';
        const statusBadge = eff === 6 ? `<span class="badge major">MAJOR flood${synthSuffix}</span>` :
                            eff === 5 ? `<span class="badge near">Near major${synthSuffix}</span>` :
                            eff === 4 ? `<span class="badge near">Moderate${synthSuffix}</span>` :
                            eff === 3 ? `<span class="badge near">Minor${synthSuffix}</span>` : '';
        const peakBadge = isDeclining ? `<span class="badge peaked">PEAKED · ${peakDrop} cm below</span>` : '';
        const publicLabel = m.label ? `<span class="station-id">${m.label}</span>` : '';
        const orrpb = getOrrpbContext(m);
        const orrpbLine = orrpb ? `<br><span style="font-size:11px;opacity:0.85;color:var(--text-muted)">ORRPB ref: ${orrpb.context}</span>` : '';
        const dispCurrent = displayLevel(m, latest.valeur);
        const dispPeak = displayLevel(m, peak.valeur);
        return `
          <div class="card ${item.cls}" data-station-id="${item.id}">
            <div class="label">${item.name}${publicLabel} — ${item.subtitle}</div>
            <div class="value">
              <span>${dispCurrent.toFixed(3)}</span>
              <span class="unit">m</span>
              <span class="trend ${t.cls}">${t.text}</span>
            </div>
            ${flowRow(m)}
            <div class="sub">
              Reading ${ago(latest.date_prise_valeur)} · ${peakSource}: <strong>${dispPeak.toFixed(3)} m</strong> at ${timeLabel(peak.date_prise_valeur)}
              <br>${statusBadge}${peakBadge}${orrpbLine}
            </div>
          </div>
        `;
      }).join('');
    }

    function renderChart(stationId, d) {
      const cfg = STATIONS[stationId];
      const vals = d.readings.slice(-windowHours);
      const m = d.metadata;
      const thresholds = (m.seuils_niv || []).map(s => ({
        val: s.valeur,
        label: THRESHOLD_COLORS[s.type]?.label || s.type,
        color: THRESHOLD_COLORS[s.type]?.color || '#888'
      }));
      const latest = vals[vals.length - 1];
      const pk = classifyPeak(vals, latest);
      const peak = pk.peak;
      const peakLbl = pk.isPeaked ? 'Peak' : 'High so far';
      document.getElementById(cfg.infoId).innerHTML =
        `Currently <strong>${latest.valeur.toFixed(3)} m</strong> · ${peakLbl} <strong>${peak.valeur.toFixed(3)} m</strong> at ${timeLabel(peak.date_prise_valeur)} · Quebec status ${m.etat_niv}/6`;

      const isDark = isDarkMode();
      const grid = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const txt = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.55)';

      if (charts[stationId]) charts[stationId].destroy();
      const showPoints = vals.length <= 12;
      charts[stationId] = new Chart(document.getElementById(cfg.chartId), {
        type: 'line',
        data: {
          labels: vals.map(v => timeLabel(v.date_prise_valeur)),
          datasets: [{
            data: vals.map(v => v.valeur),
            borderColor: cfg.color,
            backgroundColor: cfg.color + '15',
            borderWidth: 2,
            pointRadius: showPoints ? 4 : 0,
            pointHoverRadius: 6,
            pointHoverBackgroundColor: cfg.color,
            pointHoverBorderColor: isDark ? '#1e1e1e' : '#fff',
            pointHoverBorderWidth: 2,
            pointBackgroundColor: cfg.color,
            tension: 0.2,
            fill: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false, axis: 'x' },
          hover: { mode: 'index', intersect: false, axis: 'x' },
          plugins: {
            legend: { display: false },
            tooltip: {
              mode: 'index',
              intersect: false,
              backgroundColor: isDark ? 'rgba(30,30,30,0.95)' : 'rgba(255,255,255,0.98)',
              titleColor: isDark ? '#f0f0f0' : '#1a1a1a',
              bodyColor: isDark ? '#f0f0f0' : '#1a1a1a',
              borderColor: isDark ? '#444' : '#ddd',
              borderWidth: 1,
              padding: 8,
              displayColors: false,
              callbacks: {
                title: (items) => items.length ? items[0].label : '',
                label: (c) => `${c.parsed.y.toFixed(3)} m`
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: txt, font: { size: 10 }, maxTicksLimit: 7, maxRotation: 0 } },
            y: (() => {
              const cfgY = { grid: { color: grid }, ticks: { color: txt, font: { size: 11 }, callback: v => v.toFixed(2) } };
              if (stationId === 1195) {
                const dataMin = Math.min(...vals.map(v => v.valeur));
                const dataMax = Math.max(...vals.map(v => v.valeur));
                // include historical peaks within 0.5m of the data range
                const nearby = HISTORICAL_PEAKS.filter(p => p.level >= dataMin - 0.5 && p.level <= dataMax + 0.5);
                if (nearby.length) {
                  cfgY.suggestedMin = Math.min(dataMin, ...nearby.map(p => p.level)) - 0.03;
                  cfgY.suggestedMax = Math.max(dataMax, ...nearby.map(p => p.level)) + 0.03;
                }
              }
              return cfgY;
            })()
          }
        },
        plugins: [{
          id: 'thresholdLines',
          afterDraw: (chart) => {
            const { ctx, scales: { x: xA, y: yA } } = chart;
            thresholds.forEach(t => {
              const y = yA.getPixelForValue(t.val);
              if (y < yA.top || y > yA.bottom) return;
              ctx.save();
              ctx.beginPath();
              ctx.setLineDash([3, 3]);
              ctx.strokeStyle = t.color;
              ctx.lineWidth = 1;
              ctx.moveTo(xA.left, y);
              ctx.lineTo(xA.right, y);
              ctx.stroke();
              ctx.fillStyle = t.color;
              ctx.font = '10px sans-serif';
              ctx.textAlign = 'right';
              ctx.fillText(`${t.label} ${t.val.toFixed(2)}`, xA.right - 4, y - 3);
              ctx.restore();
            });
            // Historical peaks — only on Lac Coulonge (1195)
            if (stationId === 1195) {
              const peakColor = isDark ? 'rgba(200,200,200,0.55)' : 'rgba(100,100,100,0.6)';
              HISTORICAL_PEAKS.forEach(p => {
                const y = yA.getPixelForValue(p.level);
                if (y < yA.top || y > yA.bottom) return;
                ctx.save();
                ctx.beginPath();
                ctx.setLineDash([2, 5]);
                ctx.strokeStyle = peakColor;
                ctx.lineWidth = 1;
                ctx.moveTo(xA.left, y);
                ctx.lineTo(xA.right, y);
                ctx.stroke();
                ctx.fillStyle = peakColor;
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText(`${p.year} peak ${p.level.toFixed(2)}`, xA.left + 4, y - 3);
                ctx.restore();
              });
            }
          }
        }]
      });

      document.getElementById(cfg.legendId).innerHTML = thresholds.map(t => 
        `<span class="thresh-item" style="color: ${t.color}"><span class="thresh-line"></span>${t.label}</span>`
      ).join('');
    }

    function renderProperty(lcLatest, trendPerHour) {
      const el = document.getElementById('thresh-list');
      el.classList.remove('skeleton');
      el.innerHTML = PROPERTY_THRESHOLDS.map(t => {
        let status, cls;
        if (lcLatest >= t.level) { status = 'Exceeded'; cls = 'flooded'; }
        else if (lcLatest >= t.level - 0.05) { status = 'Very close'; cls = 'close'; }
        else if (lcLatest >= t.level - 0.15) { status = `${((t.level - lcLatest) * 100).toFixed(0)} cm below`; cls = 'close'; }
        else { status = `${((t.level - lcLatest) * 100).toFixed(0)} cm below`; cls = 'safe'; }
        const eta = etaToThreshold(lcLatest, t.level, trendPerHour);
        let etaHtml = '';
        if (cls !== 'flooded') {
          if (eta) etaHtml = `<span class="eta rising">ETA ${eta}</span>`;
          else if (trendPerHour != null && trendPerHour < -0.00005) etaHtml = `<span class="eta">↓ declining</span>`;
          else if (trendPerHour != null && Math.abs(trendPerHour) <= 0.00005) etaHtml = `<span class="eta">→ stable</span>`;
        }
        const rate = ((t.histCount / HISTORICAL_RECORD_YEARS) * 100).toFixed(t.histCount < 4 ? 1 : 0);
        const baseRate = `<span class="base-rate" title="Annual peak ≥ this level in ${t.histCount} of ${HISTORICAL_RECORD_YEARS} years on record (1972–2026)">${t.histCount}/${HISTORICAL_RECORD_YEARS} yrs · ${rate}%</span>`;
        return `<div class="thresh-row"><span class="level">${t.level.toFixed(2)} m</span><span class="desc">${t.desc} ${baseRate}</span><span class="status ${cls}">${status}${etaHtml}</span></div>`;
      }).join('');
    }

    function renderSummary(lcData, seasonPeak) {
      const box = document.getElementById('summary-box');
      box.classList.remove('skeleton');
      const latest = lcData.readings[lcData.readings.length - 1];
      const windowPk = classifyPeak(lcData.readings, latest);
      // Prefer the season-to-date max from history (covers freshet crests older
      // than the live buffer). A higher season peak is by definition a true past
      // peak (it predates the live 72h buffer) so it always counts as declined.
      const seasonWins = seasonPeak && seasonPeak.valeur > windowPk.peak.valeur;
      const peak = seasonWins ? seasonPeak : windowPk.peak;
      const isDeclined = seasonWins || windowPk.isPeaked;
      const peakLabel = seasonWins ? 'Season peak' : (isDeclined ? 'Recent peak' : 'High so far');
      const cottageMargin = (108.75 - latest.valeur) * 100;
      const rank = rankPeak(peak.valeur);

      let statusCls, statusText;
      if (latest.valeur >= 108.75) {
        statusCls = 'danger';
        statusText = 'At or above cottage threshold — take action';
      } else if (latest.valeur >= 108.48) {
        statusCls = 'warning';
        statusText = 'Property flooding — water in backyard / driveway';
      } else if (isDeclined) {
        statusCls = 'good';
        statusText = 'Past first peak — second peak still possible';
      } else {
        statusCls = 'good';
        statusText = 'Below property thresholds';
      }
      box.className = `summary ${statusCls}`;

      // Threshold bar range: 108.0 m → 109.3 m (covers all property thresholds).
      // Zones in the gradient align with: 108.30 / 108.48 / 108.75 / 109.01.
      const BAR_MIN = 108.0, BAR_MAX = 109.3;
      const pct = v => Math.max(0, Math.min(100, ((v - BAR_MIN) / (BAR_MAX - BAR_MIN)) * 100));
      const markerLeft = pct(latest.valeur);
      const peakLeft = pct(peak.valeur);
      // Only show the peak label/tick if peak is meaningfully separate from current (>=1 cm).
      const peakOffsetCm = (peak.valeur - latest.valeur) * 100;
      const showPeakSeparate = peakOffsetCm >= 1;
      const tickLabel = isDeclined ? 'peak' : 'high';
      const peakTick = showPeakSeparate
        ? `<div class="summary-peak-tick" style="left:${peakLeft}%" title="${peakLabel} ${peak.valeur.toFixed(2)} m"></div>
           <div class="summary-peak-label" style="left:${peakLeft}%">${tickLabel} ${peak.valeur.toFixed(2)}</div>`
        : '';
      // Suppress zone labels that would visually collide with the peak label.
      const zoneLabels = [
        { v: 108.30, t: '108.30' },
        { v: 108.75, t: 'cottage 108.75' },
        { v: 109.17, t: '2019 rec.' }
      ].filter(z => !showPeakSeparate || Math.abs(pct(z.v) - peakLeft) > 8)
       .map(z => `<div class="summary-zone-label" style="left:${pct(z.v)}%">${z.t}</div>`).join('');

      const marginValue = cottageMargin > 0 ? `${cottageMargin.toFixed(0)} cm` : 'breached';
      const note = (statusCls === 'good' && isDeclined)
        ? `<div class="summary-note">Reservoir drawdown upstream can drive a secondary crest weeks after the first — watch <a href="https://www.ottawariver.ca/forecasts" target="_blank">ORRPB forecasts</a>. Season's true peak may still be ahead.</div>`
        : '';

      box.innerHTML = `
        <div class="summary-headline">
          <span class="status-dot"></span>
          <strong>${statusText}</strong>
        </div>
        <div class="summary-bar">
          ${zoneLabels}
          ${peakTick}
          <div class="summary-marker" style="left:${markerLeft}%"></div>
          <div class="summary-marker-label" style="left:${markerLeft}%">${latest.valeur.toFixed(2)} m</div>
        </div>
        <div class="summary-stats">
          <div class="summary-stat">
            <div class="stat-value">${peak.valeur.toFixed(2)} m</div>
            <div class="stat-label">${peakLabel}</div>
          </div>
          <div class="summary-stat">
            <div class="stat-value">${marginValue}</div>
            <div class="stat-label">Cottage margin</div>
          </div>
          <div class="summary-stat">
            <div class="stat-value">${ordinal(rank)} / ${HISTORICAL_RECORD_YEARS}</div>
            <div class="stat-label">Historic rank</div>
          </div>
        </div>
        ${note}
      `;
    }

    // Render hours as the same label the range buttons use (24h, 7d, 30d, …).
    function windowLabel(h) {
      if (h >= 24 && h % 24 === 0 && h > 72) return `${h / 24}d`;
      return `${h}h`;
    }

    // ---- Watershed snapshot bar chart ----------------------------------------
    // Main-stem stations upstream → downstream. Tributary 1004 excluded.
    const CORRIDOR_BAR_STATIONS = [951, 545, 1279, 1195, 99001, 984, 548, 550, 981, 1264];
    const STATUS_BAR_COLORS = {
      6: 'rgba(156,26,26,0.85)',  5: 'rgba(224,75,74,0.85)',
      4: 'rgba(224,127,47,0.85)', 3: 'rgba(239,159,39,0.85)',
      2: 'rgba(245,200,66,0.85)', 1: 'rgba(76,175,80,0.85)',
      0: 'rgba(79,163,199,0.85)'
    };
    let corridorChart = null;

    function dailyChangeCm(readings) {
      if (!readings || readings.length < 2) return null;
      const latest = readings[readings.length - 1];
      const latestT = new Date(latest.date_prise_valeur).getTime();
      const targetT = latestT - 24 * 3600 * 1000;
      let best = readings[0];
      let bestDiff = Math.abs(new Date(best.date_prise_valeur).getTime() - targetT);
      for (const r of readings) {
        const diff = Math.abs(new Date(r.date_prise_valeur).getTime() - targetT);
        if (diff < bestDiff) { best = r; bestDiff = diff; }
      }
      // Reject if our nearest reading is more than 6 h off the 24 h mark — avoids
      // misleading deltas on stations with ingest gaps.
      if (bestDiff > 6 * 3600 * 1000) return null;
      return (latest.valeur - best.valeur) * 100;
    }

    function renderCorridorBar() {
      const canvas = document.getElementById('corridorChart');
      if (!canvas || !lastData) return;
      const isDark = isDarkMode();
      const txt = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.55)';
      const grid = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const items = [];
      for (const id of CORRIDOR_BAR_STATIONS) {
        const s = lastData[id];
        if (!s?.metadata?.dern_valeur_niv) continue;
        const offset = ORRPB_HISTORIC_PEAKS[id]?.datumOffset || 0;
        const masl = s.metadata.dern_valeur_niv + offset;
        const eff = getEffectiveEtat(s.metadata);
        const change = dailyChangeCm(s.readings);
        const name = (STATION_NAMES[id] && STATION_NAMES[id][mapLang]) || s.metadata.label || `${id}`;
        const refPeaks = ORRPB_HISTORIC_PEAKS[id]?.peaks;
        const peak2019 = refPeaks?.[2019] ?? null;     // already in MASL
        items.push({ id, name, masl, eff, change, peak2019 });
      }
      if (!items.length) return;
      // Y-axis must include the 2019 record where present, plus a small headroom.
      const dataMin = Math.min(...items.map(i => i.masl));
      const dataMax = Math.max(...items.flatMap(i => [i.masl, i.peak2019 ?? -Infinity]));
      const span = dataMax - dataMin;

      if (corridorChart) corridorChart.destroy();
      corridorChart = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: items.map(i => i.name),
          datasets: [{
            data: items.map(i => i.masl),
            backgroundColor: items.map(i => STATUS_BAR_COLORS[i.eff ?? 0] || STATUS_BAR_COLORS[0]),
            borderColor: items.map(i => (STATUS_BAR_COLORS[i.eff ?? 0] || STATUS_BAR_COLORS[0]).replace('0.85', '1')),
            borderWidth: 1,
            borderRadius: 3
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          animation: false,
          onClick: (evt, els) => { if (els && els[0]) openBarDetail(items[els[0].index].id); },
          onHover: (evt, els) => { evt.native.target.style.cursor = els && els[0] ? 'pointer' : 'default'; },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: isDark ? 'rgba(30,30,30,0.95)' : 'rgba(255,255,255,0.98)',
              titleColor: isDark ? '#f0f0f0' : '#1a1a1a',
              bodyColor: isDark ? '#f0f0f0' : '#1a1a1a',
              borderColor: isDark ? '#444' : '#ddd', borderWidth: 1,
              callbacks: {
                label: (ctx) => {
                  const it = items[ctx.dataIndex];
                  const lines = [`${it.masl.toFixed(2)} m`];
                  if (it.change != null) {
                    const sign = it.change > 0 ? '+' : '';
                    lines.push(`24 h: ${sign}${it.change.toFixed(1)} cm`);
                  }
                  if (it.peak2019 != null) {
                    const headroom = ((it.peak2019 - it.masl) * 100).toFixed(0);
                    lines.push(`2019 record: ${it.peak2019.toFixed(2)} m  (${headroom} cm above)`);
                  }
                  return lines;
                }
              }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: txt, font: { size: 10 }, maxRotation: 35, minRotation: 35 } },
            y: {
              grid: { color: grid },
              ticks: { color: txt, font: { size: 10 }, callback: v => v.toFixed(0) + ' m' },
              title: { display: true, text: 'MASL', color: txt, font: { size: 10 } },
              // Leave room above the tallest bar for value labels + 2019 reference line.
              suggestedMax: dataMax + Math.max(3, span * 0.05)
            }
          }
        },
        plugins: [{
          id: 'cornerLabels',
          afterDatasetsDraw: (chart) => {
            const { ctx, scales: { y: yA } } = chart;
            const ds = chart.getDatasetMeta(0).data;
            ctx.save();
            ctx.textAlign = 'center';
            items.forEach((it, i) => {
              const bar = ds[i];
              if (!bar) return;
              // 2019 reference line on this bar — horizontal dashed segment at y(2019).
              if (it.peak2019 != null) {
                const yRef = yA.getPixelForValue(it.peak2019);
                const halfW = (bar.width || 24) / 2;
                ctx.save();
                ctx.beginPath();
                ctx.setLineDash([4, 3]);
                ctx.strokeStyle = 'rgba(224,75,74,0.95)'; // red, matches "major flood" palette
                ctx.lineWidth = 1.5;
                ctx.moveTo(bar.x - halfW - 2, yRef);
                ctx.lineTo(bar.x + halfW + 2, yRef);
                ctx.stroke();
                ctx.restore();
              }
              // Value label, above bar top.
              ctx.fillStyle = isDark ? '#f0f0f0' : '#222';
              ctx.font = '600 10px -apple-system, BlinkMacSystemFont, sans-serif';
              ctx.fillText(`${it.masl.toFixed(2)} m`, bar.x, bar.y - 16);
              // Daily change, just below value, coloured by direction.
              if (it.change != null) {
                const arrow = it.change > 0.5 ? '↑' : it.change < -0.5 ? '↓' : '→';
                const colour = it.change > 0.5 ? 'rgb(224,75,74)' : it.change < -0.5 ? 'rgb(76,175,80)' : (isDark ? '#aaa' : '#666');
                const sign = it.change > 0 ? '+' : '';
                ctx.fillStyle = colour;
                ctx.font = '500 10px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.fillText(`${arrow} ${sign}${it.change.toFixed(1)} cm`, bar.x, bar.y - 4);
              }
            });
            // Once per chart, draw the 2019 legend swatch in the top-right corner.
            const chartArea = chart.chartArea;
            if (chartArea) {
              ctx.save();
              ctx.setLineDash([4, 3]);
              ctx.strokeStyle = 'rgba(224,75,74,0.95)';
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.moveTo(chartArea.right - 92, chartArea.top + 8);
              ctx.lineTo(chartArea.right - 76, chartArea.top + 8);
              ctx.stroke();
              ctx.setLineDash([]);
              ctx.fillStyle = isDark ? '#aaa' : '#666';
              ctx.font = '500 10px -apple-system, BlinkMacSystemFont, sans-serif';
              ctx.textAlign = 'left';
              ctx.fillText('2019 record (ORRPB)', chartArea.right - 72, chartArea.top + 11);
              ctx.restore();
            }
            ctx.restore();
          }
        }]
      });
    }

    // ---- Bar-detail modal: tight-scale view of a single station's references ----
    function openBarDetail(stationId) {
      const station = lastData?.[stationId];
      if (!station) return;
      const meta = station.metadata;
      const offset = ORRPB_HISTORIC_PEAKS[stationId]?.datumOffset || 0;
      const currentMasl = meta.dern_valeur_niv + offset;
      const refs = ORRPB_HISTORIC_PEAKS[stationId]?.peaks || {};
      const change = dailyChangeCm(station.readings);
      const eff = getEffectiveEtat(meta);
      const name = (STATION_NAMES[stationId] && STATION_NAMES[stationId][mapLang]) || meta.label || `${stationId}`;
      const labelChip = meta.label ? ` <span class="station-id">${meta.label}</span>` : '';

      // Build the comparison rows: every reference year + property thresholds (1195 only).
      const rows = [];
      for (const [year, level] of Object.entries(refs)) rows.push({ label: `${year} ORRPB peak`, level: Number(level) });
      if (stationId === 1195) {
        for (const t of PROPERTY_THRESHOLDS) rows.push({ label: t.desc, level: t.level, isProperty: true });
      }
      rows.push({ label: 'Current reading', level: currentMasl, isCurrent: true });
      rows.sort((a, b) => b.level - a.level);

      const ETAT_NAMES = { 6: 'Major flood', 5: 'Near major', 4: 'Moderate', 3: 'Minor', 2: 'Pre-alert', 1: 'Normal', 0: 'No threshold' };
      const stateText = eff != null ? ETAT_NAMES[eff] : '';
      const changeText = change == null ? '' :
        (() => {
          const arrow = change > 0.5 ? '↑' : change < -0.5 ? '↓' : '→';
          const sign = change > 0 ? '+' : '';
          return ` · 24 h: ${arrow} ${sign}${change.toFixed(1)} cm`;
        })();

      const rowHtml = rows.map(r => {
        const diff = r.level - currentMasl;
        const cm = Math.abs(diff) * 100;
        const sign = diff > 0 ? `${cm.toFixed(0)} cm above` : diff < 0 ? `${cm.toFixed(0)} cm below` : 'AT this level';
        const cls = r.isCurrent ? 'current' : '';
        const diffCls = r.isCurrent ? '' : diff > 0 ? 'above' : diff < 0 ? 'below' : '';
        const showDiff = r.isCurrent ? '' : sign;
        return `<div class="bar-detail-row ${cls}">
          <span>${r.label}</span>
          <span class="level-val">${r.level.toFixed(2)} m</span>
          <span class="level-diff ${diffCls}">${showDiff}</span>
        </div>`;
      }).join('');

      const body = `
        <h3 id="bar-detail-title">${name}${labelChip}</h3>
        <div class="now-meta">${stateText}${changeText}</div>
        <div class="now-line">${currentMasl.toFixed(2)}<span class="unit">m MASL</span></div>
        <div class="bar-detail-rows">${rowHtml}</div>
        ${rows.length > 1 ? '<div class="footnote">Sorted by level. Property thresholds (Lac Coulonge only) come from 2019 personal observations; ORRPB peaks from "Know Your Levels" (2025-05-06).</div>' : ''}
      `;
      document.getElementById('bar-detail-body').innerHTML = body;
      const modal = document.getElementById('bar-detail-modal');
      modal.classList.add('open');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeBarDetail(e) {
      if (e && e.currentTarget !== e.target) return; // click inside content shouldn't close
      const modal = document.getElementById('bar-detail-modal');
      if (!modal) return;
      modal.classList.remove('open');
      modal.setAttribute('aria-hidden', 'true');
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('bar-detail-modal')?.classList.contains('open')) closeBarDetail();
    });

    function updateChartTitles() {
      const waLbl = lastData?.[1279]?.metadata?.label;
      const lcLbl = lastData?.[1195]?.metadata?.label;
      const crLbl = lastData?.[1004]?.metadata?.label;
      const waSub = waLbl ? ` <span class="station-id">${waLbl}</span>` : '';
      const lcSub = lcLbl ? ` <span class="station-id">${lcLbl}</span>` : '';
      const crSub = crLbl ? ` <span class="station-id">${crLbl}</span>` : '';
      const w = windowLabel(windowHours);
      document.getElementById('wa-title').innerHTML = `Waltham (Ottawa River — upstream)${waSub} — last ${w}`;
      document.getElementById('lc-title').innerHTML = `Lac Coulonge (Ottawa River)${lcSub} — last ${w}`;
      document.getElementById('cr-title').innerHTML = `Coulonge River tributary at Route 148${crSub} — last ${w}`;
    }

    async function fetchStationHistory(stationId, hours) {
      const since = new Date(Date.now() - hours * 3600 * 1000).toISOString();
      const url = `/history/river_readings?station_id=eq.${stationId}&time=gte.${since}&order=time.asc&select=time,level_m`;
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`history HTTP ${r.status}`);
      const rows = await r.json();
      return rows.map(x => ({ date_prise_valeur: x.time, valeur: x.level_m }));
    }

    // Fetch the single highest reading for a station within a lookback window.
    // Used to find the season's true peak even when older than the live buffer.
    async function fetchSeasonPeak(stationId, lookbackDays = 90) {
      const since = new Date(Date.now() - lookbackDays * 86400 * 1000).toISOString();
      const url = `/history/river_readings?station_id=eq.${stationId}&time=gte.${since}&order=level_m.desc&limit=1&select=time,level_m`;
      const r = await fetch(url, { cache: 'no-store' });
      if (!r.ok) throw new Error(`season-peak HTTP ${r.status}`);
      const rows = await r.json();
      return rows.length ? { valeur: rows[0].level_m, date_prise_valeur: rows[0].time } : null;
    }

    // Merge server history with the latest in-memory Vigilance readings.
    // History is authoritative for the time range; in-memory fills any gap since the last cron run.
    function mergeHistory(history, live) {
      if (!history || !history.length) return live || [];
      const lastHistTs = new Date(history[history.length - 1].date_prise_valeur).getTime();
      const tail = (live || []).filter(v => new Date(v.date_prise_valeur).getTime() > lastHistTs);
      return history.concat(tail);
    }

    async function renderWindow(stationId) {
      if (!lastData || !lastData[stationId]) return;
      const d = lastData[stationId];
      if (windowHours <= 72) {
        renderChart(stationId, d);
        return;
      }
      const key = `${stationId}:${windowHours}`;
      let history = historyCache[key];
      if (!history) {
        try {
          history = await fetchStationHistory(stationId, windowHours);
          historyCache[key] = history;
        } catch (e) {
          console.warn(`history fetch for ${stationId} failed: ${e.message}`);
          renderChart(stationId, d); // fall back to the Vigilance 72h buffer
          return;
        }
      }
      const merged = mergeHistory(history, d.readings);
      renderChart(stationId, { metadata: d.metadata, readings: merged });
    }

    function setWindow(hours) {
      windowHours = hours;
      document.querySelectorAll('.range-btn').forEach(b => {
        b.classList.toggle('active', Number(b.dataset.hours) === hours);
      });
      updateChartTitles();
      renderWindow(1279);
      renderWindow(1195);
      renderWindow(1004);
      // Stations tab redraws too — its mini-charts share windowHours with Overview.
      if (document.querySelector('.tab-panel[data-tab="stations"].active')) {
        renderStationsTab();
      }
    }

    document.getElementById('range-picker').addEventListener('click', (e) => {
      const btn = e.target.closest('.range-btn');
      if (btn) setWindow(Number(btn.dataset.hours));
    });
    document.getElementById('range-picker-stations').addEventListener('click', (e) => {
      const btn = e.target.closest('.range-btn');
      if (btn) setWindow(Number(btn.dataset.hours));
    });

    // ---- Tab navigation (hash-routed) ----
    function activateTab(name) {
      if (!['overview', 'stations', 'reservoirs'].includes(name)) name = 'overview';
      document.querySelectorAll('.tab-strip button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.tab === name));
      if (location.hash !== '#' + name) history.replaceState(null, '', '#' + name);
      if (name === 'stations') renderStationsTab();
      if (name === 'reservoirs') renderReservoirsTab();
    }
    document.getElementById('tab-strip').addEventListener('click', e => {
      const btn = e.target.closest('button[data-tab]');
      if (btn) activateTab(btn.dataset.tab);
    });
    window.addEventListener('hashchange', () => activateTab(location.hash.slice(1) || 'overview'));

    // ---- Stations tab: 10 mini-charts in a 2-col grid ----
    const STATIONS_TAB_IDS = [951, 545, 1279, 1195, 1004, 99001, 984, 548, 550, 981, 1264];
    // Map each river gauge to its nearest weather station key for precip context.
    const GAUGE_TO_WX = {
      951: "Val-d'Or, QC", 545: 'Rouyn-Noranda, QC', 1279: 'Pembroke, ON',
      1195: 'Pembroke, ON', 1004: 'Pembroke, ON',
      984: 'Ottawa-Gatineau', 548: 'Ottawa-Gatineau', 550: 'Ottawa-Gatineau',
      981: 'Hawkesbury, ON', 1264: 'Hawkesbury, ON'
    };
    let stationMiniCharts = {};
    let lastWeatherCache = null;

    function buildStationCard(id) {
      const station = lastData?.[id];
      if (!station?.metadata) return `<div class="station-card-mini" data-station-id="${id}"><div class="meta">Loading ${id}…</div></div>`;
      const m = station.metadata;
      const latest = station.readings[station.readings.length - 1];
      const dispCurrent = displayLevel(m, latest.valeur);
      const change = dailyChangeCm(station.readings);
      const changeArrow = change == null ? '' : (change > 0.5 ? '↑' : change < -0.5 ? '↓' : '→');
      const changeCls = change == null ? '' : (change > 0.5 ? 'up' : change < -0.5 ? 'down' : 'flat');
      const changeText = change == null ? '' : `<span class="change ${changeCls}">${changeArrow} ${change > 0 ? '+' : ''}${change.toFixed(1)} cm/24h</span>`;

      const eff = getEffectiveEtat(m);
      const ETAT_NAMES = { 6: 'Major flood', 5: 'Near major', 4: 'Moderate', 3: 'Minor', 2: 'Pre-alert', 1: 'Normal', 0: 'No threshold' };
      const synthetic = isEffectiveEtatSynthetic(m);
      const stateBadgeCls = eff >= 5 ? 'badge major' : eff >= 3 ? 'badge near' : 'badge peaked';
      const stateBadge = eff != null ? `<span class="${stateBadgeCls}">${ETAT_NAMES[eff] || ''}${synthetic ? ' (est.)' : ''}</span>` : '';

      const orrpb = getOrrpbContext(m);
      const orrpbChip = orrpb ? `<span class="orrpb-chip" title="ORRPB reference">${orrpb.context}</span>` : '';

      // Percentile chip (Lac Coulonge against 54-yr ORRPB record; others against ECCC peaks if available).
      let pctlChip = '';
      if (id === 1195) {
        const seasonPk = lastSeasonPeaks[1195];
        const peakLevel = (seasonPk && seasonPk.valeur > latest.valeur) ? seasonPk.valeur : latest.valeur;
        const rank = rankPeak(peakLevel);
        const pctl = Math.round(((HISTORICAL_RECORD_YEARS - rank + 1) / HISTORICAL_RECORD_YEARS) * 100);
        pctlChip = `<span class="pctl-chip ${pctl >= 90 ? 'high' : ''}" title="Season peak ranks ${ordinal(rank)} of ${HISTORICAL_RECORD_YEARS} on record (1972–2026)">${pctl}th %ile (1972–2026)</span>`;
      } else if (m.label && WSC_ID_PATTERN.test(m.label) && eccPeakCache[m.label]) {
        const peaks = eccPeakCache[m.label];
        const above = peaks.filter(p => latest.valeur >= p).length;
        const pctl = Math.round((above / peaks.length) * 100);
        pctlChip = `<span class="pctl-chip ${pctl >= 90 ? 'high' : ''}" title="Current reading vs. ECCC ${peaks.length}-yr annual peak record">${pctl}th %ile (ECCC ${peaks.length}-yr)</span>`;
      }

      // 48 h precip forecast at the nearest weather station.
      let precipChip = '';
      const wxName = GAUGE_TO_WX[id];
      if (wxName && lastWeatherCache) {
        const wx = lastWeatherCache.find(w => w.station.name === wxName);
        if (wx?.hourly) {
          const mm = next48hPrecip(wx.hourly);
          const cls = mm >= 20 ? 'rain-heavy' : mm >= 5 ? 'rain-moderate' : 'rain-light';
          precipChip = `<span class="precip-chip ${cls}" title="Forecast precipitation next 48 hours at ${wxName}">☔ ${mm.toFixed(1)} mm/48h · ${wxName}</span>`;
        }
      }

      const labelChip = m.label ? `<span class="station-id">${m.label}</span>` : '';
      const stationName = (STATION_NAMES[id] && STATION_NAMES[id][mapLang]) || m.label || `${id}`;
      return `<div class="station-card-mini" data-station-id="${id}" onclick="openBarDetail(${id})">
        <div class="header-row">
          <div class="name">${stationName}${labelChip}</div>
          <div class="level">${dispCurrent.toFixed(2)}<span class="unit">m</span>${changeText}</div>
        </div>
        <div class="meta">${m.description || ''}</div>
        <div class="chart-wrap"><canvas id="stn-chart-${id}"></canvas></div>
        <div class="badge-row">${stateBadge}${orrpbChip}${pctlChip}${precipChip}</div>
      </div>`;
    }

    async function renderStationsTab() {
      const grid = document.getElementById('stations-grid');
      if (!grid || !lastData) return;
      // Make sure regional stations are in lastData (Overview's regional fetch
      // populates them async; we may need them sooner if the user lands on /#stations).
      await Promise.all(STATIONS_TAB_IDS.map(async id => {
        if (lastData[id]) return;
        const mvcaSpec = REGIONAL_STATIONS.find(s => s.id === id && s.source === 'mvca');
        try {
          lastData[id] = mvcaSpec ? await fetchKiwisStation(mvcaSpec) : await fetchStation(id);
        } catch (e) { console.warn(`stn ${id}: ${e.message}`); }
      }));
      // Pre-fetch history if a >72h window is selected.
      if (windowHours > 72) {
        await Promise.all(STATIONS_TAB_IDS.map(async id => {
          const key = `${id}:${windowHours}`;
          if (historyCache[key]) return;
          try { historyCache[key] = await fetchStationHistory(id, windowHours); }
          catch (e) { console.warn(`history ${id}: ${e.message}`); }
        }));
      }
      // Tear down any existing mini-charts before re-rendering.
      Object.values(stationMiniCharts).forEach(c => { try { c.destroy(); } catch (_) {} });
      stationMiniCharts = {};
      grid.innerHTML = STATIONS_TAB_IDS.map(buildStationCard).join('');
      // Now render each chart inside its card.
      STATIONS_TAB_IDS.forEach(id => renderStationMiniChart(id));
    }

    // ---- Reservoirs tab ----
    // Hand-curated upstream → downstream order. Reservoirs sit on different
    // sub-basins (Ottawa main stem, Montreal River, Kipawa, Madawaska, Gatineau,
    // Lièvre); we sort them by where each tributary joins the Ottawa, with the
    // upstream-of-Mansfield set first and downstream-of-Mansfield set after.
    const RESERVOIR_ORDER = [
      // Upper Ottawa main stem
      'rapide_7',              // Decelles-Rapid VII
      'dozois',
      'quinze',
      // Tributaries entering at/above Lake Timiskaming
      'lady_evelyn',           // Montreal River → Ottawa near Mattawa
      'kipawa',                // Kipawa River → Ottawa at Témiscaming
      // Lake Timiskaming itself
      'timiskaming_haileybury',
      'timiskaming',
      // Ottawa main stem between Mattawa and Pembroke
      'des_joachims',
      // ─── Lac Coulonge / Mansfield property ───
      // Tributaries joining the Ottawa downstream of Mansfield
      'bark_lake',             // Madawaska → Ottawa at Arnprior
      'cabonga',               // Gens de Terre → Gatineau → Ottawa at Hull
      'baskatong',             // Gatineau → Ottawa at Hull
      'mitchinamecus',         // Lièvre headwaters
      'kiamika',               // Lièvre
      'poisson_blanc'          // Lièvre → Ottawa at Masson
    ];
    const RESERVOIR_ORDER_INDEX = Object.fromEntries(RESERVOIR_ORDER.map((id, i) => [id, i]));
    let reservoirLimitsCache = null;
    let reservoirSnapshotCache = null;

    async function ensureReservoirLimits() {
      if (reservoirLimitsCache) return reservoirLimitsCache;
      try {
        const r = await fetch('/reservoir-limits.json', { cache: 'no-store' });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        reservoirLimitsCache = await r.json();
      } catch (e) {
        console.warn(`reservoir-limits fetch: ${e.message}`);
        reservoirLimitsCache = { reservoirs: {}, _calibrated: false };
      }
      return reservoirLimitsCache;
    }

    // One PostgREST query fetches the latest reading per reservoir AND the
    // reading from ~24 h ago (for the daily-change indicator).
    async function fetchReservoirSnapshot() {
      // Latest per reservoir (view).
      const latestR = await fetch('/history/latest_reservoir_readings', { cache: 'no-store' });
      if (!latestR.ok) throw new Error(`latest reservoir HTTP ${latestR.status}`);
      const latest = await latestR.json();
      // Pull a 7-day window for prior-day matching. Wider than strictly needed
      // (~50 h would suffice) but it's a tiny payload and gives the daily-change
      // search resilience if a scrape is missed. Tiny ~100-row response.
      const since = new Date(Date.now() - 7 * 24 * 3600 * 1000).toISOString();
      const histR = await fetch(`/history/reservoir_readings?time=gte.${since}&order=time.asc`, { cache: 'no-store' });
      const history = histR.ok ? await histR.json() : [];
      const byRid = {};
      for (const r of history) (byRid[r.reservoir_id] ||= []).push(r);
      return latest.map(l => {
        const series = byRid[l.reservoir_id] || [];
        const latestT = new Date(l.time).getTime();
        const targetT = latestT - 24 * 3600 * 1000;
        let prior = null, bestDiff = Infinity;
        for (const r of series) {
          const t = new Date(r.time).getTime();
          // Reject readings that are too close to the latest — without this, a
          // narrow series can match the latest point against itself and produce
          // a "0 change" / "flat" indicator everywhere.
          if (latestT - t < 12 * 3600 * 1000) continue;
          const dt = Math.abs(t - targetT);
          if (dt < bestDiff && r.level_m != null) { prior = r; bestDiff = dt; }
        }
        return { ...l, prior_level_m: prior?.level_m ?? null };
      });
    }

    function pctFull(level, low, high) {
      if (level == null || high <= low) return null;
      return Math.max(0, Math.min(110, ((level - low) / (high - low)) * 100));
    }

    function fillClass(pct) {
      if (pct == null) return 'fill-unknown';
      if (pct >= 90) return 'fill-near';
      if (pct >= 80) return 'fill-high';
      if (pct >= 65) return 'fill-mid';
      return 'fill-low';
    }

    function fillBarColor(pct) {
      if (pct == null) return 'var(--border)';
      if (pct >= 90) return 'rgb(224,75,74)';
      if (pct >= 80) return 'rgb(224,127,47)';
      if (pct >= 65) return 'rgb(245,200,66)';
      return 'rgb(76,175,80)';
    }

    function buildReservoirCard(snap, cfg) {
      const pct = pctFull(snap.level_m, cfg.low_limit, cfg.high_limit);
      const priorPct = pctFull(snap.prior_level_m, cfg.low_limit, cfg.high_limit);
      const change = (pct != null && priorPct != null) ? pct - priorPct : null;
      const cls = fillClass(pct);
      const barColor = fillBarColor(pct);
      const barWidth = pct != null ? Math.min(100, pct) : 0;
      const volume = pct != null ? Math.round(cfg.capacity_mcm * pct / 100) : null;
      const volumeStr = volume != null
        ? `${volume.toLocaleString()} M m³ / ${Math.round(cfg.capacity_mcm).toLocaleString()}`
        : '—';
      const changeText = change == null
        ? '—'
        : Math.abs(change) < 0.05
          ? '→ flat'
          : change > 0
            ? `↑ +${change.toFixed(2)} pp/24h`
            : `↓ ${change.toFixed(2)} pp/24h`;
      const changeCls = change == null
        ? 'flat'
        : Math.abs(change) < 0.05 ? 'flat' : change > 0 ? 'up' : 'down';
      const reading = snap.level_m != null ? `${snap.level_m.toFixed(2)} m` : '—';
      return `
        <div class="res-card ${cls}" data-reservoir-id="${snap.reservoir_id}" title="${cfg.name} (${cfg.agency})&#10;Reading: ${reading}&#10;Range: ${cfg.low_limit.toFixed(2)} – ${cfg.high_limit.toFixed(2)} m">
          <div class="res-name">${cfg.name}<span class="agency">${cfg.agency}</span></div>
          <div class="res-pct">${pct != null ? pct.toFixed(1) : '—'}<span class="unit">% full</span></div>
          <div class="res-volume">${volumeStr}</div>
          <div class="res-change ${changeCls}">${changeText}</div>
          <div class="res-bar"><div class="res-bar-fill" style="width:${barWidth}%; background:${barColor}"></div></div>
        </div>
      `;
    }

    async function renderReservoirsTab() {
      const grid = document.getElementById('reservoirs-grid');
      const status = document.getElementById('reservoir-status-line');
      const calibWarn = document.getElementById('reservoir-calibration-warning');
      if (!grid) return;
      const limitsCfg = await ensureReservoirLimits();
      if (calibWarn) calibWarn.style.display = limitsCfg._calibrated ? 'none' : 'block';
      let snapshot;
      try {
        snapshot = await fetchReservoirSnapshot();
        reservoirSnapshotCache = snapshot;
      } catch (e) {
        grid.innerHTML = `<div class="error" style="grid-column:1/-1;color:var(--red);font-size:13px;padding:14px;">Could not load reservoir data: ${e.message}.<br>Has the daily scrape run yet? <code>kubectl -n data get cronjobs reservoir-ingest</code></div>`;
        return;
      }
      if (!snapshot.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;color:var(--text-muted);font-size:13px;padding:14px;">No reservoir readings in the database yet — the daily scrape runs at 21:30 UTC. Trigger a manual run with: <code>kubectl -n data create job --from=cronjob/reservoir-ingest reservoir-ingest-now</code></div>`;
        return;
      }
      const cfg = limitsCfg.reservoirs || {};
      // Sort upstream → downstream by hydrological position so visitors can read
      // the basin in the same direction water actually flows. The colour-coded
      // fill bars still flag the most-constrained reservoirs at a glance.
      const enriched = snapshot
        .filter(s => cfg[s.reservoir_id])
        .map(s => ({ snap: s, cfg: cfg[s.reservoir_id] }))
        .map(x => ({ ...x, pct: pctFull(x.snap.level_m, x.cfg.low_limit, x.cfg.high_limit) }))
        .sort((a, b) => {
          const ai = RESERVOIR_ORDER_INDEX[a.snap.reservoir_id] ?? 999;
          const bi = RESERVOIR_ORDER_INDEX[b.snap.reservoir_id] ?? 999;
          return ai - bi;
        });

      // Insert a "Mansfield" boundary row between des_joachims and the first
      // downstream-of-Mansfield reservoir (bark_lake).
      const html = [];
      let boundaryEmitted = false;
      const desJoachimsIdx = RESERVOIR_ORDER_INDEX['des_joachims'];
      for (const item of enriched) {
        const itemIdx = RESERVOIR_ORDER_INDEX[item.snap.reservoir_id] ?? 999;
        if (!boundaryEmitted && itemIdx > desJoachimsIdx) {
          html.push('<div class="reservoir-boundary">▼ Lac Coulonge / Mansfield ▼<span>Reservoirs below this line drain into tributaries that join the Ottawa downstream of Mansfield (Madawaska / Gatineau / Lièvre).</span></div>');
          boundaryEmitted = true;
        }
        html.push(buildReservoirCard(item.snap, item.cfg));
      }
      grid.innerHTML = html.join('');
      if (status && snapshot.length) {
        const newest = snapshot.reduce((acc, s) => new Date(s.time) > new Date(acc.time) ? s : acc, snapshot[0]);
        status.textContent = `${snapshot.length} reservoirs · most recent reading ${ago(newest.time)}`;
      }
    }

    function renderStationMiniChart(id) {
      const canvas = document.getElementById(`stn-chart-${id}`);
      if (!canvas || !lastData?.[id]) return;
      const station = lastData[id];
      const m = station.metadata;
      const offset = ORRPB_HISTORIC_PEAKS[id]?.datumOffset || 0;
      // Build the value series for the active window.
      let vals;
      if (windowHours <= 72) {
        vals = station.readings.slice(-windowHours);
      } else {
        const hist = historyCache[`${id}:${windowHours}`];
        vals = hist ? mergeHistory(hist, station.readings) : station.readings;
      }
      if (!vals.length) return;
      const isDark = isDarkMode();
      const txt = isDark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.55)';
      const grid = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)';
      const eff = getEffectiveEtat(m);
      const lineColors = { 6: 'rgb(156,26,26)', 5: 'rgb(224,75,74)', 4: 'rgb(224,127,47)', 3: 'rgb(239,159,39)', 2: 'rgb(245,200,66)', 1: 'rgb(76,175,80)', 0: 'rgb(79,163,199)' };
      const lineColor = lineColors[eff ?? 0];
      // Threshold lines from Vigilance seuils_niv (already in API datum, so add offset for MASL display).
      const thresholds = ((m.seuils_niv) || []).map(s => ({
        val: s.valeur + offset, label: THRESHOLD_COLORS[s.type]?.label || s.type, color: THRESHOLD_COLORS[s.type]?.color || '#888'
      }));
      if (stationMiniCharts[id]) stationMiniCharts[id].destroy();
      stationMiniCharts[id] = new Chart(canvas, {
        type: 'line',
        data: {
          labels: vals.map(v => timeLabel(v.date_prise_valeur)),
          datasets: [{
            data: vals.map(v => v.valeur + offset),
            borderColor: lineColor,
            backgroundColor: lineColor.replace('rgb', 'rgba').replace(')', ',0.12)'),
            borderWidth: 1.5, pointRadius: 0, pointHoverRadius: 4, tension: 0.2, fill: true
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          interaction: { mode: 'index', intersect: false, axis: 'x' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: isDark ? 'rgba(30,30,30,0.95)' : 'rgba(255,255,255,0.98)',
              titleColor: isDark ? '#f0f0f0' : '#1a1a1a',
              bodyColor: isDark ? '#f0f0f0' : '#1a1a1a',
              borderColor: isDark ? '#444' : '#ddd', borderWidth: 1, padding: 6, displayColors: false,
              callbacks: { label: c => `${c.parsed.y.toFixed(2)} m` }
            }
          },
          scales: {
            x: { grid: { display: false }, ticks: { color: txt, font: { size: 9 }, maxTicksLimit: 5, maxRotation: 0 } },
            y: { grid: { color: grid }, ticks: { color: txt, font: { size: 9 }, callback: v => v.toFixed(2) } }
          }
        },
        plugins: [{
          id: 'thresholdLines',
          afterDraw: (chart) => {
            const { ctx, scales: { x: xA, y: yA } } = chart;
            thresholds.forEach(t => {
              const y = yA.getPixelForValue(t.val);
              if (y < yA.top || y > yA.bottom) return;
              ctx.save(); ctx.beginPath(); ctx.setLineDash([3, 3]);
              ctx.strokeStyle = t.color; ctx.lineWidth = 1;
              ctx.moveTo(xA.left, y); ctx.lineTo(xA.right, y); ctx.stroke();
              ctx.restore();
            });
          }
        }]
      });
    }

    async function fetchData() {
      const btn = document.getElementById('refresh');
      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = 'Refreshing';

      try {
        // Pull live readings + season-to-date peaks in parallel. Season peaks are
        // best-effort — fall back to null on failure so the cards still render.
        const peakOrNull = id => fetchSeasonPeak(id).catch(e => { console.warn(`season peak ${id}: ${e.message}`); return null; });
        const stationOrNull = id => fetchStation(id).catch(e => { console.warn(`station ${id}: ${e.message}`); return null; });
        const [lc, cr, wa, mt, lcPeak, crPeak, waPeak, mtPeak] = await Promise.all([
          fetchStation(1195), fetchStation(1004), fetchStation(1279), stationOrNull(545),
          peakOrNull(1195), peakOrNull(1004), peakOrNull(1279), peakOrNull(545)
        ]);
        const data = { 1195: lc, 1004: cr, 1279: wa };
        if (mt) data[545] = mt;
        const seasonPeaks = { 1195: lcPeak, 1004: crPeak, 1279: waPeak, 545: mtPeak };
        lastData = data;
        lastSeasonPeaks = seasonPeaks;
        // Pull ECCC annual peaks for any station Vigilance can't classify (etat_niv=0).
        // Cached after first call, so subsequent refreshes are free.
        await precomputeEcccPeaks(Object.values(data).map(d => d.metadata));

        // Fresh fetch — blow away cached history so the next >72h render re-pulls.
        Object.keys(historyCache).forEach(k => delete historyCache[k]);

        renderSummary(lc, lcPeak);
        renderCards(data, seasonPeaks);
        renderCorridorBar();
        if (document.querySelector('.tab-panel[data-tab="stations"].active')) renderStationsTab();
        renderWindow(1279);
        renderWindow(1195);
        renderWindow(1004);
        renderProperty(lc.readings[lc.readings.length - 1].valeur, lc.metadata.trend_niv);
        updateChartTitles();

        // Freeze + precipitation tracker (non-blocking). Cache the result so the
        // Stations tab can pull per-gauge precip context off the same fetch.
        fetchWeather().then(w => { lastWeatherCache = w; renderFreezePanel(w); }).catch(err => {
          const sum = document.getElementById('freeze-summary');
          sum.classList.remove('skeleton');
          sum.className = 'freeze-summary warn';
          sum.innerHTML = `<strong>Weather unavailable:</strong> ${err.message}`;
          document.getElementById('freeze-grid').classList.remove('skeleton');
        });

        // Regional downstream stations (non-blocking; partial failures fine)
        fetchRegional().then(async rows => {
          // Cache regional data in lastData so the map drawer can render markers without re-fetching.
          rows.forEach(r => { if (r.ok && r.data) lastData[r.meta.id] = r.data; });
          await precomputeEcccPeaks(rows.filter(r => r.ok && r.data).map(r => r.data.metadata));
          renderRegional(rows);
          renderCorridorBar(); // refresh now that regional stations are in lastData
        }).catch(err => {
          document.getElementById('regional-cards').innerHTML = `<div class="card">Regional data unavailable: ${err.message}</div>`;
        });

        const latestLC = lc.readings[lc.readings.length - 1];
        lastDataTimestamp = latestLC.date_prise_valeur;
        renderStatus('live', `Live · last reading ${ago(latestLC.date_prise_valeur)} · refreshed ${new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', timeZone: 'America/Toronto' })}`);
        renderBanner(null, null);
      } catch (e) {
        renderStatus('error', `Error: ${e.message}`);
        // Check origin
        if (location.protocol === 'file:') {
          renderBanner('error', `<strong>This dashboard requires a web server.</strong> Opening the HTML file directly from disk (file://) doesn't work because of browser security. See the README for how to host it. Data may be incomplete.`);
        } else {
          renderBanner('error', `<strong>Failed to fetch data:</strong> ${e.message}. The Vigilance API may be temporarily down. Retrying automatically in 60 seconds.`);
          setTimeout(fetchData, 60000);
        }
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.textContent = 'Refresh';
      }
    }

    // ---- Map drawer (lazy-loaded Leaflet) ----------------------------------
    // Stations to render on the map; superset of hero + regional cards.
    const MAP_STATIONS = [951, 545, 1279, 1195, 1004, 99001, 984, 548, 550, 981, 1264];
    // Status-bucket → CSS class. Mirrors Vigilance's etat_niv 1–6, plus 0 for stations
    // without configured flood thresholds (we still show them, just neutral colour).
    function statusClass(etat) { return `status-${etat == null ? 0 : etat}`; }
    // Ottawa River main-stem waypoints in upstream → downstream order. Station
    // coords come from the API (resolved at render time); intermediates fill in
    // the river's notable bends. Tributary 1004 is intentionally excluded.
    const RIVER_ROUTE = [
      { stationId: 951 },                             // Temiscaming village
      { stationId: 545 },                             // Mattawa
      { lat: 45.83, lon: -77.11, label: 'Pembroke' },
      { stationId: 1279 },                            // Waltham
      { stationId: 1195 },                            // Lac Coulonge
      { lat: 45.55, lon: -76.30, label: 'Bristol' },  // mid-bend SE of Lac Coulonge
      { stationId: 99001 },                           // Buckhams Bay (MVCA) — NW end of Lac Deschênes
      { stationId: 984 },                             // Aylmer — mid-lake
      { stationId: 548 },                             // Britannia — SE/downstream end
      { stationId: 550 },                             // Hull
      { stationId: 981 },                             // Masson
      { lat: 45.62, lon: -74.86, label: 'Lefaivre' },
      { lat: 45.57, lon: -74.39, label: 'Carillon' }, // dam
      { stationId: 1264 }                             // Rigaud
    ];
    let mapInstance = null;
    let mapMarkers = [];
    let riverRouteLine = null;
    let homeMarker = null;
    let leafletReady = null;
    let mapLang = 'en';

    // Property location pin. PLACEHOLDER coordinates — overwrite with your own
    // property's lat/lon. If you also have a LoRa weather station (or any GPS
    // device) feeding lat/lon into a `esp_gps` table accessible via the
    // /history/ proxy, refreshHomeCoords() will pick it up live; otherwise the
    // static value here is used.
    const HOME_PIN = { lat: 45.84, lon: -76.74, label: { en: 'Property', fr: 'Propriété' } };

    async function refreshHomeCoords() {
      try {
        const r = await fetch('/history/esp_gps?device_name=eq.Weather-Station&order=time.desc&limit=1&select=gps_latitude,gps_longitude');
        if (!r.ok) return;
        const rows = await r.json();
        const row = rows[0];
        if (row && Number.isFinite(row.gps_latitude) && Number.isFinite(row.gps_longitude)) {
          HOME_PIN.lat = row.gps_latitude;
          HOME_PIN.lon = row.gps_longitude;
        }
      } catch (e) { console.warn(`home coords fetch: ${e.message}`); }
    }

    // Map drawer text in EN / FR.
    const MAP_LABELS = {
      title:    { en: 'Ottawa River corridor',                     fr: 'Corridor de la rivière des Outaouais' },
      subtitle: { en: 'click a station to jump to its card',       fr: 'cliquez sur une station pour ouvrir sa fiche' },
      close:    { en: 'Close map',                                 fr: 'Fermer la carte' },
      legend:   { en: 'Legend',                                    fr: 'Légende' },
      status:   { en: 'Flood state',                               fr: 'État de crue' },
      trend:    { en: 'Trend',                                     fr: 'Tendance' },
      ref:      { en: 'Reference',                                 fr: 'Repères' },
      s6: { en: 'Major flood',     fr: 'Crue majeure' },
      s5: { en: 'Near major',      fr: 'Près de majeure' },
      s4: { en: 'Moderate',        fr: 'Modérée' },
      s3: { en: 'Minor',           fr: 'Mineure' },
      s2: { en: 'Pre-alert',       fr: 'Pré-alerte' },
      s1: { en: 'Normal',          fr: 'Normale' },
      s0: { en: 'No threshold',    fr: 'Sans seuil' },
      rising:   { en: 'Rising',    fr: 'En hausse' },
      falling:  { en: 'Falling',   fr: 'En baisse' },
      stable:   { en: 'Stable',    fr: 'Stable' },
      cottage:  { en: 'Cottage',   fr: 'Chalet' },
      river:    { en: 'Ottawa River', fr: 'Rivière des Outaouais' },
      about:    { en: 'How to read', fr: 'Comment lire' },
      about_status: {
        en: '<strong>Dot colour</strong> reflects the station\'s flood state. Quebec stations use Vigilance\'s official thresholds. Stations Vigilance can\'t classify (e.g. Mattawa) are synthesized — first against ORRPB published peaks (2017 / 2019 / 2023), then against the ECCC long-record percentile if needed. Synthetic values are flagged with <em>(est.)</em>.',
        fr: 'La <strong>couleur du point</strong> reflète l\'état de crue de la station. Les stations québécoises utilisent les seuils officiels Vigilance. Les stations sans seuil (p. ex. Mattawa) sont estimées — d\'abord à partir des pics ORRPB publiés (2017 / 2019 / 2023), sinon à partir du percentile ECCC sur l\'ensemble du registre. Les valeurs estimées sont marquées <em>(est.)</em>.'
      },
      about_pulse: {
        en: '<strong>Pulse colour</strong> is short-term trend over the last hour: red ≥ +1 mm/h rising, green ≤ −1 mm/h falling, grey otherwise.',
        fr: 'La <strong>couleur de la pulsation</strong> indique la tendance horaire : rouge si ≥ +1 mm/h en hausse, vert si ≤ −1 mm/h en baisse, gris sinon.'
      },
      about_pctl: {
        en: '<strong>%ile</strong> on Lac Coulonge\'s callout = rank of this season\'s peak among 54 historical annual peaks (1972–2026). 94th %ile means it would beat all but ~3 historical years.',
        fr: '<strong>Centile</strong> sur la fiche Lac Coulonge = rang du pic saisonnier parmi 54 pics annuels historiques (1972–2026). 94ᵉ centile signifie qu\'il dépasse tous sauf ~3 années historiques.'
      },
      about_orrpb: {
        en: '<strong>ORRPB ref</strong> compares the current level to the 2017 / 2019 / 2023 freshet peaks at that station — useful shorthand for "is this a 2019-level event?".',
        fr: '<strong>Réf. ORRPB</strong> compare le niveau actuel aux pics de crue 2017 / 2019 / 2023 à cette station — raccourci utile pour situer l\'événement.'
      },
      about_src: {
        en: 'Sources: Quebec Vigilance API, MVCA / Kisters KiWIS (Buckhams Bay), ORRPB "Know Your Levels" PDF (2025-05-06), ECCC HYDAT.',
        fr: 'Sources : API Vigilance Québec, MVCA / Kisters KiWIS (Baie Buckhams), document ORRPB « Know Your Levels » (2025-05-06), ECCC HYDAT.'
      }
    };
    // Per-station display name; English by default, French where it differs.
    const STATION_NAMES = {
      951:  { en: 'Temiscaming',     fr: 'Témiscaming' },
      545:  { en: 'Mattawa',         fr: 'Mattawa' },
      1279: { en: 'Waltham',         fr: 'Waltham' },
      1195: { en: 'Lac Coulonge',    fr: 'Lac Coulonge' },
      1004: { en: 'Coulonge River',  fr: 'Rivière Coulonge' },
      99001:{ en: 'Buckhams Bay',    fr: 'Baie Buckhams' },
      984:  { en: 'Aylmer',          fr: 'Aylmer' },
      548:  { en: 'Britannia',       fr: 'Britannia' },
      550:  { en: 'Hull',            fr: 'Hull' },
      981:  { en: 'Masson',          fr: 'Masson' },
      1264: { en: 'Rigaud',          fr: 'Rigaud' }
    };

    function loadCss(href) {
      return new Promise(resolve => {
        if (document.querySelector(`link[href="${href}"]`)) { resolve(); return; }
        const l = document.createElement('link');
        l.rel = 'stylesheet'; l.href = href; l.onload = resolve; l.onerror = resolve;
        document.head.appendChild(l);
      });
    }
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[src="${src}"]`)) { resolve(); return; }
        const s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    function ensureLeaflet() {
      if (leafletReady) return leafletReady;
      // Load core Leaflet first; the minimap plugin depends on `L` being defined.
      leafletReady = Promise.all([
        loadCss('https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'),
        loadScript('https://unpkg.com/leaflet@1.9.4/dist/leaflet.js')
      ]).then(() => Promise.all([
        loadCss('https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.css'),
        loadScript('https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.js')
      ]));
      return leafletReady;
    }

    // EPSG:3857 (Web Mercator metres) → WGS84 lat/lon, matches the API's geom_p.
    function wmToLatLon([x, y]) {
      const lon = x / 6378137 * 180 / Math.PI;
      const lat = (2 * Math.atan(Math.exp(y / 6378137)) - Math.PI / 2) * 180 / Math.PI;
      return [lat, lon];
    }

    // Priority order for the sticky-cluster collision pass. The property gauge
    // always wins; then upstream early-warning stations; then downstream context.
    const CALLOUT_PRIORITY = [1195, 545, 1279, 1004, 951, 548, 984, 550, 981, 1264];
    function rectsOverlap(a, b) {
      return !(a.right < b.left || a.left > b.right || a.bottom < b.top || a.top > b.bottom);
    }

    // Recompute card marker positions in screen-pixel space so the leader-line
    // callout stays a fixed visual distance from the dot at any zoom level.
    // Then run a sticky-cluster pass: walk priority order and hide cards that
    // overlap higher-priority cards already on screen. Dots stay visible.
    function repositionCallouts() {
      if (!mapInstance) return;
      for (const m of mapMarkers) {
        const dotPx = mapInstance.latLngToLayerPoint(m.stationLatLng);
        const cardPx = dotPx.add(m.offsetPx);
        const cardLatLng = mapInstance.layerPointToLatLng(cardPx);
        m.card.setLatLng(cardLatLng);
        m.line.setLatLngs([m.stationLatLng, cardLatLng]);
      }
      // Sort markers by configured priority, fall back to original order.
      const ordered = [...mapMarkers].sort((a, b) => {
        const ai = CALLOUT_PRIORITY.indexOf(a.id);
        const bi = CALLOUT_PRIORITY.indexOf(b.id);
        return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
      });
      const visibleRects = [];
      for (const m of ordered) {
        const cardEl = m.card.getElement()?.querySelector('.river-marker-card');
        if (!cardEl) continue;
        cardEl.style.visibility = '';
        const rect = cardEl.getBoundingClientRect();
        const collides = visibleRects.some(r => rectsOverlap(rect, r));
        if (collides) {
          cardEl.style.visibility = 'hidden';
          m.line.setStyle({ opacity: 0 });
        } else {
          m.line.setStyle({ opacity: 0.7 });
          visibleRects.push(rect);
        }
      }
    }

    function scrollToCard(stationId) {
      const el = document.querySelector(`[data-station-id="${stationId}"]`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.remove('scroll-flash');
      // Force reflow so the animation restarts when re-clicking the same marker.
      void el.offsetWidth;
      el.classList.add('scroll-flash');
    }

    async function renderMapMarkers() {
      if (!mapInstance || !lastData) return;
      // Tear down existing markers / lines — readings change between refreshes.
      for (const m of mapMarkers) {
        if (m.dot)  mapInstance.removeLayer(m.dot);
        if (m.card) mapInstance.removeLayer(m.card);
        if (m.line) mapInstance.removeLayer(m.line);
      }
      mapMarkers = [];
      const present = [];
      let dotIndex = 0;
      // Broadcast-style callout offset (in screen pixels) — alternates above/below so
      // adjacent stations don't pile up. Slight horizontal slant gives a leader-line feel.
      const offsetForIndex = i => {
        const up = i % 2 === 0;
        const x = (i % 4 < 2 ? -1 : 1) * 20;
        const y = up ? -72 : 72;
        return L.point(x, y);
      };
      for (const id of MAP_STATIONS) {
        let station = lastData[id];
        if (!station) {
          const mvcaSpec = REGIONAL_STATIONS.find(s => s.id === id && s.source === 'mvca');
          try {
            station = mvcaSpec ? await fetchKiwisStation(mvcaSpec) : await fetchStation(id);
            lastData[id] = station;
          } catch (e) { console.warn(`map fetch ${id}: ${e.message}`); continue; }
        }
        if (!station.metadata?.geom_p) continue;
        const [lat, lon] = wmToLatLon(station.metadata.geom_p.coordinates);
        const stationLatLng = L.latLng(lat, lon);
        const latest = station.readings[station.readings.length - 1];
        const trendMmH = (station.metadata.trend_niv || 0) * 1000;
        const trendCmH = trendMmH / 10;
        const arrow = trendCmH > 0.05 ? '↑' : trendCmH < -0.05 ? '↓' : '→';
        const trendTxt = `${arrow} ${Math.abs(trendCmH).toFixed(1)} cm/h`;
        const trendCls = trendMmH > 1 ? 'trend-rising' : trendMmH < -1 ? 'trend-falling' : 'trend-stable';
        const statusCls = statusClass(getEffectiveEtat(station.metadata));
        const name = (STATION_NAMES[id] && STATION_NAMES[id][mapLang]) || station.metadata.label || `Station ${id}`;
        const delay = (dotIndex * 220) % 2400;

        // Dot at the true station location. Pulse colour reflects trend; dot fill reflects role/flood.
        const dotIcon = L.divIcon({
          className: 'river-marker-icon',
          html: `<div class="river-dot ${statusCls} ${trendCls}" style="animation-delay:${delay}ms"></div>`,
          iconSize: [12, 12], iconAnchor: [6, 6]
        });
        const dot = L.marker(stationLatLng, { icon: dotIcon, riseOnHover: true, zIndexOffset: 500 }).addTo(mapInstance);

        // Percentile line — only Lac Coulonge has the historical depth (54-yr CSV).
        let percentileLine = '';
        if (id === 1195) {
          const seasonPk = lastSeasonPeaks[1195];
          const peakLevel = (seasonPk && seasonPk.valeur > latest.valeur) ? seasonPk.valeur : latest.valeur;
          const rank = rankPeak(peakLevel);
          const pctl = Math.round(((HISTORICAL_RECORD_YEARS - rank + 1) / HISTORICAL_RECORD_YEARS) * 100);
          const cls = pctl >= 90 ? 'percentile high' : 'percentile';
          percentileLine = `<div class="${cls}" title="Season peak ${peakLevel.toFixed(2)} m ranks ${ordinal(rank)} of ${HISTORICAL_RECORD_YEARS} on record (1972–2026)"><strong>${pctl}th %ile</strong> · 1972–2026</div>`;
        }
        // Card divIcon — placed at an offset latLng we recompute on zoom/pan.
        const dispCurrent = displayLevel(station.metadata, latest.valeur);
        const cardHtml = `<div class="river-marker-card ${statusCls}" data-jump-id="${id}">
          <div class="name">${name}</div>
          <div class="level">${dispCurrent.toFixed(2)}<span class="unit"> m</span></div>
          <div class="trend">${trendTxt}</div>
          ${percentileLine}
        </div>`;
        const cardIcon = L.divIcon({ className: 'river-marker-icon', html: cardHtml, iconSize: null, iconAnchor: [70, 18] });
        const card = L.marker(stationLatLng, { icon: cardIcon, riseOnHover: true, zIndexOffset: 600 }).addTo(mapInstance);

        // Leader line. We update both endpoints in repositionCallouts().
        const line = L.polyline([stationLatLng, stationLatLng], {
          color: '#888', weight: 1.2, opacity: 0.7, dashArray: '4,4', interactive: false
        }).addTo(mapInstance);

        const jump = () => { toggleMap(); setTimeout(() => scrollToCard(id), 350); };
        dot.on('click', jump);
        card.on('click', jump);

        mapMarkers.push({ id, dot, card, line, offsetPx: offsetForIndex(dotIndex), stationLatLng });
        present.push([lat, lon]);
        dotIndex++;
      }

      // River route polyline (animated marching-ants line).
      if (riverRouteLine) mapInstance.removeLayer(riverRouteLine);
      const routeCoords = [];
      for (const wp of RIVER_ROUTE) {
        if (wp.lat != null) {
          routeCoords.push([wp.lat, wp.lon]);
        } else {
          const s = lastData[wp.stationId];
          if (s?.metadata?.geom_p) routeCoords.push(wmToLatLon(s.metadata.geom_p.coordinates));
        }
      }
      if (routeCoords.length >= 2) {
        riverRouteLine = L.polyline(routeCoords, {
          color: '#4FA3C7', weight: 3, opacity: 0.7, dashArray: '12,12',
          lineCap: 'round', interactive: false, className: 'river-route'
        }).addTo(mapInstance);
        riverRouteLine.bringToBack(); // sit under the leader lines
      }
      renderHomePin();
      repositionCallouts();
      if (present.length) mapInstance.fitBounds(present, { padding: [40, 40] });
    }

    function renderHomePin() {
      if (!mapInstance) return;
      if (homeMarker) mapInstance.removeLayer(homeMarker);
      const label = HOME_PIN.label[mapLang] || HOME_PIN.label.en;
      const icon = L.divIcon({
        className: 'river-marker-icon',
        html: `<div class="home-pin" title="${label}">🏠</div>`,
        iconSize: [22, 22], iconAnchor: [11, 11]
      });
      homeMarker = L.marker([HOME_PIN.lat, HOME_PIN.lon], { icon, riseOnHover: true, zIndexOffset: 800 }).addTo(mapInstance);
      homeMarker.bindTooltip(`<strong>${label}</strong>`, {
        direction: 'top', offset: [0, -12], className: 'river-tip', opacity: 0.95
      });
    }

    function applyMapLang() {
      const t = (k) => MAP_LABELS[k][mapLang] || MAP_LABELS[k].en;
      const title = document.getElementById('map-title');
      const sub = document.getElementById('map-subtitle');
      const close = document.getElementById('map-close-btn');
      const legendBtnText = document.getElementById('map-legend-btn-text');
      if (title) title.textContent = t('title');
      if (sub)   sub.textContent = t('subtitle');
      if (close) close.setAttribute('aria-label', t('close'));
      if (legendBtnText) legendBtnText.textContent = t('legend');
      const aboutBtnText = document.getElementById('map-about-btn-text');
      if (aboutBtnText) aboutBtnText.textContent = t('about');
      document.querySelectorAll('#map-lang-toggle button').forEach(b => {
        b.classList.toggle('active', b.dataset.lang === mapLang);
      });
      renderLegend();
      renderAbout();
    }

    function renderLegend() {
      const legend = document.getElementById('map-legend');
      if (!legend) return;
      const t = (k) => MAP_LABELS[k][mapLang] || MAP_LABELS[k].en;
      const dot = (rgb, txt) => `<div class="legend-item"><span class="legend-dot" style="--legend-color:${rgb}"></span>${txt}</div>`;
      const pulse = (rgb, txt) => `<div class="legend-item"><span class="legend-pulse" style="--legend-color:${rgb}"></span>${txt}</div>`;
      legend.innerHTML = `
        <div class="legend-section">
          <div class="legend-title">${t('status')}</div>
          ${dot('156,26,26',  t('s6'))}
          ${dot('224,75,74',  t('s5'))}
          ${dot('224,127,47', t('s4'))}
          ${dot('239,159,39', t('s3'))}
          ${dot('245,200,66', t('s2'))}
          ${dot('76,175,80',  t('s1'))}
          ${dot('79,163,199', t('s0'))}
        </div>
        <div class="legend-section">
          <div class="legend-title">${t('trend')}</div>
          ${pulse('224,75,74',  t('rising'))}
          ${pulse('90,180,120', t('falling'))}
          ${pulse('160,160,160', t('stable'))}
        </div>
        <div class="legend-section">
          <div class="legend-item"><span class="legend-home">🏠</span>${t('cottage')}</div>
          <div class="legend-item"><span class="legend-river"></span>${t('river')}</div>
        </div>
      `;
    }

    function toggleLegend() {
      const legend = document.getElementById('map-legend');
      if (legend) legend.classList.toggle('open');
      // Mutually exclusive with the about panel — only one should sit at top-left at a time.
      const about = document.getElementById('map-about');
      if (about?.classList.contains('open')) about.classList.remove('open');
    }

    function renderAbout() {
      const panel = document.getElementById('map-about');
      if (!panel) return;
      const t = (k) => MAP_LABELS[k][mapLang] || MAP_LABELS[k].en;
      panel.innerHTML = `
        <p>${t('about_status')}</p>
        <p>${t('about_pulse')}</p>
        <p>${t('about_pctl')}</p>
        <p>${t('about_orrpb')}</p>
        <p class="src">${t('about_src')}</p>
      `;
    }

    function toggleAbout() {
      const about = document.getElementById('map-about');
      if (!about) return;
      if (!about.dataset.initialized) { renderAbout(); about.dataset.initialized = '1'; }
      about.classList.toggle('open');
      // Hide legend if it was open at the same anchor.
      const legend = document.getElementById('map-legend');
      if (about.classList.contains('open') && legend?.classList.contains('open')) legend.classList.remove('open');
    }

    // ---- Dams overlay: hydroelectric stations + major dams + principal reservoirs --
    let damsLayerGroup = null;
    let damsData = null;
    let damsLoading = null;

    async function ensureDamsData() {
      if (damsData) return damsData;
      if (!damsLoading) damsLoading = fetch('/orw-dams.json').then(r => r.ok ? r.json() : null).catch(() => null);
      damsData = await damsLoading;
      return damsData;
    }

    function buildDamsLayer(data) {
      const group = L.layerGroup();
      // Hydroelectric stations — bigger marker for ≥100 MW.
      for (const h of data.hydro || []) {
        if (h.lat == null || h.lon == null) continue;
        const big = (h.mw || 0) >= 100;
        const cls = `dam-icon hydro${big ? ' big' : ''}`;
        const icon = L.divIcon({ className: 'river-marker-icon', html: `<div class="${cls}" title="${h.name}">⚡</div>`,
          iconSize: big ? [22, 22] : [18, 18], iconAnchor: big ? [11, 11] : [9, 9] });
        L.marker([h.lat, h.lon], { icon, riseOnHover: true })
          .bindTooltip(`<strong>${h.name}</strong><br>${h.mw || '?'} MW · ${h.owner || '—'}`,
            { direction: 'top', offset: [0, -10], className: 'river-tip', opacity: 0.95 })
          .addTo(group);
      }
      // Major dams (height 10m+). Skip those that already have a hydro entry at the
      // same coords (we already drew that marker as a hydro icon).
      const hydroSet = new Set((data.hydro || []).map(h => `${h.lat?.toFixed(3)},${h.lon?.toFixed(3)}`));
      for (const dm of data.major_dams || []) {
        if (dm.lat == null || dm.lon == null) continue;
        if (hydroSet.has(`${dm.lat.toFixed(3)},${dm.lon.toFixed(3)}`)) continue;
        const icon = L.divIcon({ className: 'river-marker-icon',
          html: `<div class="dam-icon major-dam" title="${dm.name}">▼</div>`,
          iconSize: [18, 18], iconAnchor: [9, 9] });
        const meta = [`${dm.height_m || '?'} m high`, dm.year ? `built ${dm.year}` : null, dm.river || null]
          .filter(Boolean).join(' · ');
        L.marker([dm.lat, dm.lon], { icon, riseOnHover: true })
          .bindTooltip(`<strong>${dm.name}</strong><br>${meta}`,
            { direction: 'top', offset: [0, -10], className: 'river-tip', opacity: 0.95 })
          .addTo(group);
      }
      // Principal reservoirs — centroid markers.
      for (const r of data.reservoirs || []) {
        if (r.lat == null || r.lon == null) continue;
        const icon = L.divIcon({ className: 'river-marker-icon',
          html: `<div class="dam-icon reservoir" title="${r.name}">≈</div>`,
          iconSize: [18, 18], iconAnchor: [9, 9] });
        const meta = [r.capacity_mcm ? `${r.capacity_mcm} Mm³` : null, r.year ? `built ${r.year}` : null, r.agency]
          .filter(Boolean).join(' · ');
        L.marker([r.lat, r.lon], { icon, riseOnHover: true })
          .bindTooltip(`<strong>${r.name}</strong> (reservoir)<br>${meta}`,
            { direction: 'top', offset: [0, -10], className: 'river-tip', opacity: 0.95 })
          .addTo(group);
      }
      return group;
    }

    // Reservoir card overlay — same data as the Reservoirs tab, plotted at each
    // reservoir's lat/lon (sourced from orw-dams.json centroids; Lady Evelyn
    // added by hand as it's not in the ArcGIS layer).
    const RESERVOIR_LOCATIONS = {
      dozois:                 { lat: 47.481, lon: -77.109 },
      rapide_7:               { lat: 47.717, lon: -78.126 },
      quinze:                 { lat: 47.592, lon: -78.983 },
      lady_evelyn:            { lat: 47.300, lon: -80.450 },
      kipawa:                 { lat: 46.958, lon: -79.029 },
      timiskaming:            { lat: 47.398, lon: -79.527 },
      timiskaming_haileybury: { lat: 47.450, lon: -79.530 },
      des_joachims:           { lat: 46.230, lon: -77.988 },
      bark_lake:              { lat: 45.463, lon: -77.863 },
      cabonga:                { lat: 47.317, lon: -76.581 },
      baskatong:              { lat: 46.809, lon: -75.859 },
      mitchinamecus:          { lat: 47.337, lon: -75.100 },
      kiamika:                { lat: 46.664, lon: -75.074 },
      poisson_blanc:          { lat: 45.986, lon: -75.737 }
    };
    let reservoirLayerGroup = null;

    async function buildReservoirsLayer() {
      if (typeof L === 'undefined') return null;
      const limitsCfg = await ensureReservoirLimits();
      let snapshot = reservoirSnapshotCache;
      if (!snapshot) {
        try { snapshot = await fetchReservoirSnapshot(); reservoirSnapshotCache = snapshot; }
        catch (e) { console.warn(`reservoir snapshot for map: ${e.message}`); return null; }
      }
      const cfg = limitsCfg.reservoirs || {};
      const group = L.layerGroup();
      for (const snap of snapshot) {
        const loc = RESERVOIR_LOCATIONS[snap.reservoir_id];
        const c = cfg[snap.reservoir_id];
        if (!loc || !c) continue;
        const pct = pctFull(snap.level_m, c.low_limit, c.high_limit);
        const priorPct = pctFull(snap.prior_level_m, c.low_limit, c.high_limit);
        const change = (pct != null && priorPct != null) ? pct - priorPct : null;
        const cls = fillClass(pct);
        const barColor = fillBarColor(pct);
        const barWidth = pct != null ? Math.min(100, pct) : 0;
        const changeArrow = change == null ? '' : Math.abs(change) < 0.05 ? '→' : change > 0 ? '↑' : '↓';
        const changeCls = change == null ? '' : Math.abs(change) < 0.05 ? '' : change > 0 ? 'up' : 'down';
        const changeStr = change == null ? '' : `${changeArrow} ${change > 0 ? '+' : ''}${change.toFixed(2)} pp/24h`;
        const html = `<div class="res-map-card ${cls}" title="${c.name} (${c.agency}) · ${snap.level_m != null ? snap.level_m.toFixed(2) + ' m' : '—'}">
          <div class="name">${c.name}</div>
          <div class="pct">${pct != null ? pct.toFixed(0) : '—'}<span class="unit">% full</span></div>
          <div class="bar"><div class="bar-fill" style="width:${barWidth}%; background:${barColor}"></div></div>
          <div class="change ${changeCls}">${changeStr}</div>
        </div>`;
        const icon = L.divIcon({ className: 'river-marker-icon', html, iconSize: null, iconAnchor: [50, 30] });
        L.marker([loc.lat, loc.lon], { icon, riseOnHover: true, zIndexOffset: 300 }).addTo(group);
      }
      return group;
    }

    async function toggleReservoirsLayer() {
      if (!mapInstance) return;
      const btn = document.getElementById('map-reservoirs-btn');
      if (reservoirLayerGroup && mapInstance.hasLayer(reservoirLayerGroup)) {
        mapInstance.removeLayer(reservoirLayerGroup);
        btn?.classList.remove('active');
        return;
      }
      if (!reservoirLayerGroup) reservoirLayerGroup = await buildReservoirsLayer();
      if (!reservoirLayerGroup) return;
      reservoirLayerGroup.addTo(mapInstance);
      btn?.classList.add('active');
    }

    async function toggleDams() {
      if (!mapInstance) return;
      const btn = document.getElementById('map-dams-btn');
      if (damsLayerGroup && mapInstance.hasLayer(damsLayerGroup)) {
        mapInstance.removeLayer(damsLayerGroup);
        btn?.classList.remove('active');
        return;
      }
      const data = await ensureDamsData();
      if (!data) {
        console.warn('Failed to load dams data');
        return;
      }
      if (!damsLayerGroup) damsLayerGroup = buildDamsLayer(data);
      damsLayerGroup.addTo(mapInstance);
      btn?.classList.add('active');
    }

    function toggleFullscreen() {
      const drawer = document.getElementById('map-drawer');
      if (!drawer) return;
      drawer.classList.toggle('fullscreen');
      // Wait for the width transition to settle before telling Leaflet to re-measure.
      setTimeout(() => {
        if (mapInstance) {
          mapInstance.invalidateSize();
          repositionCallouts();
        }
      }, 270);
    }
    document.addEventListener('click', e => {
      const btn = e.target.closest('#map-lang-toggle button');
      if (!btn) return;
      if (btn.dataset.lang === mapLang) return;
      mapLang = btn.dataset.lang;
      applyMapLang();
      if (mapInstance) renderMapMarkers(); // re-render with new strings
    });

    async function toggleMap() {
      const drawer = document.getElementById('map-drawer');
      const backdrop = document.getElementById('map-backdrop');
      if (drawer.classList.contains('open')) {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
        drawer.setAttribute('aria-hidden', 'true');
        return;
      }
      drawer.setAttribute('aria-hidden', 'false');
      drawer.classList.add('open');
      backdrop.classList.add('open');
      try { await ensureLeaflet(); }
      catch (e) {
        document.getElementById('river-map').innerHTML = `<div style="padding:20px;color:var(--text-muted)">Map library failed to load: ${e.message}</div>`;
        return;
      }
      if (!mapInstance) {
        const isDark = isDarkMode();
        const tileUrl = isDark
          ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
          : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
        mapInstance = L.map('river-map', { center: [46.4, -76.5], zoom: 7, attributionControl: true, zoomControl: false });
        L.control.zoom({ position: 'topright' }).addTo(mapInstance);
        L.tileLayer(tileUrl, { maxZoom: 18, attribution: '© OpenStreetMap contributors' }).addTo(mapInstance);
        // Mini-map for orientation. Needs its own tile layer instance because Leaflet
        // can't reuse a tile layer across multiple maps.
        if (L.Control && L.Control.MiniMap) {
          const miniLayer = L.tileLayer(tileUrl, { minZoom: 4, maxZoom: 12 });
          new L.Control.MiniMap(miniLayer, {
            toggleDisplay: true, position: 'bottomright',
            width: 130, height: 130, zoomLevelOffset: -3,
            aimingRectOptions: { color: '#4FA3C7', weight: 1, opacity: 0.8 },
            shadowRectOptions: { color: '#4FA3C7', weight: 1, opacity: 0.4, fillOpacity: 0.05 }
          }).addTo(mapInstance);
        }
        // Keep callout cards locked to a fixed pixel offset from their dots as the user pans/zooms.
        mapInstance.on('zoom move zoomend moveend viewreset', repositionCallouts);
      }
      // Leaflet needs a size hint after the drawer's transform settles.
      setTimeout(() => mapInstance.invalidateSize(), 320);
      // First-open legend defaults: shown on desktop, collapsed on mobile.
      const legend = document.getElementById('map-legend');
      if (legend && !legend.dataset.initialized) {
        renderLegend();
        if (matchMedia('(min-width: 700px)').matches) legend.classList.add('open');
        legend.dataset.initialized = '1';
      }
      await refreshHomeCoords();
      await renderMapMarkers();
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('map-drawer').classList.contains('open')) toggleMap();
    });

    // Initial UI sync — must run after all module-level declarations (mapLang etc).
    applyThemeIcon();
    applyPageLang();
    activateTab(location.hash.slice(1) || 'overview');

    // Initial load
    fetchData();

    // Auto-refresh every 10 minutes
    setInterval(fetchData, 10 * 60 * 1000);

    // Update "X min ago" every minute without re-fetching
    setInterval(() => {
      if (lastDataTimestamp) {
        renderStatus('live', `Live · last reading ${ago(lastDataTimestamp)}`);
      }
    }, 60000);
    </script>

    </body>
    </html>
  nginx.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location = / {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files /index.html =404;
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Read-only proxy to PostgREST for long-term river history.
        # Only GET is allowed so browsers can't write through this path.
        # Override the upstream via the env-substituted hostname or a config patch
        # for your deployment. Default points at the docker-compose service name.
        location /history/ {
            if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
            proxy_pass http://postgrest:3000/;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
            proxy_read_timeout 30s;
        }

        gzip on;
        gzip_types text/html text/css application/javascript application/json;
        gzip_min_length 1024;
    }
