server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Read-only proxy to PostgREST for long-term river history.
    # Only GET is allowed so browsers can't write through this path.
    # Override the upstream via the env-substituted hostname or a config patch
    # for your deployment. Default points at the docker-compose service name.
    location /history/ {
        if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }
        proxy_pass http://postgrest:3000/;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 30s;
    }

    gzip on;
    gzip_types text/html text/css application/javascript application/json;
    gzip_min_length 1024;
}
